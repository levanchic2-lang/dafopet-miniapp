{% extends "uk/_base.html" %}
{% block title %}狂犬登记 #{{ rec.id }} · 大风动物医院{% endblock %}
{% block body %}
<style>
  .rd-bc { font-size:9pt; letter-spacing:2.5px; color:var(--ink-3); margin:24px 0 16px; font-style:italic; }
  .rd-bc a { color:var(--ink-3); border-bottom:0.5px solid transparent; }
  .rd-bc a:hover { color:var(--ink); border-bottom-color:var(--ink-3); }
  .rd-bc .sep { margin:0 8px; color:var(--ink-4); }
  hr.rd-rule-double { border:0; height:4px; border-top:0.5px solid var(--ink); border-bottom:0.5px solid var(--ink); margin:18px 0 28px; }

  /* hide老 page-head（自己写） */
  body .page-head { display:none !important; }

  body .msg.ok { border:0; border-left:3px solid var(--accent-green); background:#f5f9f6; padding:10px 16px; margin-bottom:18px; font-family:var(--font-serif); font-size:10pt; color:var(--ink-2); border-radius:0; }
  body .msg.err { border:0; border-left:3px solid var(--accent-red); background:#fcf5f4; padding:10px 16px; margin-bottom:18px; font-family:var(--font-serif); font-size:10pt; color:var(--accent-red); border-radius:0; }

  body .card { background:var(--paper); border:0.5px solid var(--hair-2); border-radius:0; box-shadow:none; padding:18px 22px; margin-bottom:18px; }
  body .card h3 { font-family:var(--font-serif); font-size:11pt; letter-spacing:2px; color:var(--ink); border-bottom:0.5px solid var(--ink); padding-bottom:6px; margin-bottom:14px !important; font-weight:700; }

  body input[type=text], body input[type=tel], body input[type=date], body input:not([type]), body select, body textarea {
    font-family:var(--font-serif); font-size:10pt; color:var(--ink); background:var(--paper);
    border:0.5px solid var(--hair) !important; border-radius:0 !important; padding:6px 10px !important; outline:0;
  }
  body input:focus, body select:focus, body textarea:focus { border-color:var(--ink) !important; box-shadow:none !important; }
  body label { font-family:var(--font-serif); font-size:9pt; letter-spacing:1.5px; color:var(--ink-3); font-style:italic; }

  body .btn, body button.secondary, body button[type=submit] {
    background:var(--ink); color:var(--paper); border:0; border-radius:0;
    padding:8px 18px; cursor:pointer; font-family:var(--font-serif); font-size:10pt;
    letter-spacing:2px; font-weight:700;
  }
  body .btn.secondary, body .secondary {
    background:var(--paper) !important; color:var(--ink-2) !important;
    border:0.5px solid var(--hair) !important; font-style:italic; font-weight:400;
  }
  body .btn.secondary:hover, body .secondary:hover { color:var(--ink) !important; border-color:var(--ink-3) !important; background:var(--bg) !important; }

  body .pill, body .badge { border-radius:0 !important; font-family:var(--font-serif); font-style:italic; font-size:9pt; padding:2px 10px; border:0.5px solid var(--hair); letter-spacing:1.5px; font-weight:400; background:var(--paper); color:var(--ink-2); }
  body .pill.pill-warn, body .badge.b-pending { color:var(--accent-amber); border-color:var(--accent-amber); }
  body .pill.pill-ok, body .badge.b-ok { color:var(--accent-green); border-color:var(--accent-green); }
  body .pill.pill-info { color:var(--ink); border-color:var(--ink-3); }
  body .pill.pill-gray { color:var(--ink-3); border-color:var(--hair); }

  body .step-badge { border-radius:0 !important; font-family:var(--font-serif); font-style:italic; font-size:9.5pt; padding:5px 12px; background:var(--paper); border:0.5px solid var(--hair); }
  body .step-done { background:var(--bg); color:var(--accent-green); border-color:var(--accent-green); }
  body .step-pending { background:var(--bg); color:var(--accent-amber); border-color:var(--accent-amber); }
  body .step-wait { color:var(--ink-3); border-color:var(--hair); }

  body .danger {
    background:var(--paper) !important; color:var(--accent-red) !important;
    border:0.5px solid var(--accent-red) !important; border-radius:0 !important;
    font-family:var(--font-serif); font-style:italic; font-weight:400;
  }
  body .sig-wrap { border-radius:0 !important; border:0.5px solid var(--hair) !important; background:var(--bg) !important; }
  body .sig-toolbar button { border-radius:0 !important; border:0.5px solid var(--hair) !important; background:var(--paper) !important; font-family:var(--font-serif) !important; }
  body .info-row { border-bottom:0.5px solid var(--hair) !important; }
  body .info-label { font-family:var(--font-serif); font-style:italic; }
</style>

<div class="rd-bc">
  <a href="/admin">后台</a><span class="sep">/</span>
  <a href="/admin/rabies">狂犬疫苗登记</a><span class="sep">/</span>
  <span>#{{ rec.id }} {{ rec.owner_name }}</span>
</div>

<hr class="rd-rule-double"/>

{% include "includes/admin_rabies_detail_body.html" %}
{% endblock %}
