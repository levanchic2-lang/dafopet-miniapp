{% extends "uk/_base.html" %}
{% block title %}日历 · 大风动物医院{% endblock %}

{% block body %}

<style>
  .cal-breadcrumb {
    font-size: 9pt; letter-spacing: 2.5px; color: var(--ink-3);
    margin: 24px 0 16px; font-style: italic;
  }
  .cal-breadcrumb a { color: var(--ink-3); border-bottom: 0.5px solid transparent; }
  .cal-breadcrumb a:hover { color: var(--ink); border-bottom-color: var(--ink-3); }
  .cal-breadcrumb .sep { margin: 0 8px; color: var(--ink-4); }

  /* ─────────────────────────────────────────────────────────
     原 admin_calendar.html extra_css 的核心布局 CSS 整块照搬
     —— 不搬整个日历会塌成线性文本，必须保留 grid/position/flex
  ───────────────────────────────────────────────────────── */
  .cal-page { display:flex; flex-direction:column; height:calc(100vh - 220px); overflow:hidden; margin:0; border: 0.5px solid var(--hair-2); background: var(--paper); }
  .cal-topbar { display:flex; align-items:center; gap:0.75rem; padding:0.6rem 1.1rem; background:var(--paper); border-bottom:1px solid var(--hair); flex-shrink:0; flex-wrap:nowrap; }
  .cal-topbar > * { flex-shrink:0; }
  .cal-nav { display:flex; align-items:center; gap:0.4rem; }
  #cal-date-label { font-weight:700; font-size:1.05rem; min-width:130px; text-align:center; letter-spacing:0.01em; }
  .cal-actions { display:flex; align-items:center; gap:0.5rem; margin-left:1.5rem; flex-shrink:0; }
  .cal-actions > * { flex-shrink:0; }
  .view-sw { display:inline-flex; border:0.5px solid var(--hair); overflow:hidden; flex-shrink:0; }
  .view-sw button { padding:0.3rem 0.9rem; background:none; border:none; cursor:pointer; font-size:0.9rem; min-width:38px; flex-shrink:0; }
  .cal-body { flex:1; overflow:hidden; display:flex; flex-direction:column; }

  /* 月视图 */
  .month-grid { display:flex; flex-direction:column; height:100%; }
  .month-header { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:0.5px solid var(--hair); }
  .month-header div { text-align:center; padding:0.4rem; font-size:0.8rem; font-weight:600; color:var(--ink-3); }
  .month-body { flex:1; display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:1fr; overflow:hidden; }
  .month-cell { border-right:0.5px solid var(--hair); border-bottom:0.5px solid var(--hair); padding:0.25rem; overflow:hidden; cursor:pointer; min-height:80px; display:flex; flex-direction:column; }
  .month-cell:hover { background:var(--bg); }
  .month-cell.other-month .day-num { color:var(--ink-3); }
  .month-cell.today { background:rgba(0,0,0,0.03); }
  .day-num { font-size:0.82rem; font-weight:700; padding:0.15rem 0.3rem; width:fit-content; color:var(--ink); }
  .day-num.today-circle { background:var(--ink); color:var(--paper); border-radius:50%; width:1.65rem; height:1.65rem; display:flex; align-items:center; justify-content:center; font-size:0.82rem; }
  .month-lunar { font-size:0.68rem; color:var(--ink-3); margin-top:-0.1rem; padding:0 0.25rem 0.15rem; }
  .month-block-pill { font-size:0.72rem; padding:0.1rem 0.4rem; margin-bottom:0.15rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; background:#e0e7ff; color:#3730a3; }
  .month-event-pill { font-size:0.72rem; padding:0.1rem 0.4rem; margin-bottom:0.15rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
  .month-more { font-size:0.7rem; color:var(--ink-3); padding:0 0.25rem; cursor:pointer; }

  /* 周/日视图 */
  .week-outer { display:flex; flex-direction:column; height:100%; }
  .week-header-row { display:flex; border-bottom:0.5px solid var(--hair); flex-shrink:0; }
  .week-time-gutter { width:56px; flex-shrink:0; }
  .week-header-cols { flex:1; display:grid; }
  .week-day-head { text-align:center; padding:0.4rem 0.2rem; border-left:0.5px solid var(--hair); font-size:0.82rem; cursor:pointer; user-select:none; }
  .week-day-head:hover { background:var(--bg); }
  .week-day-head .wdn { color:var(--ink-3); font-size:0.73rem; font-weight:500; letter-spacing:0.02em; }
  .week-day-head .wdd { font-size:1.1rem; font-weight:700; line-height:2; }
  .week-day-head.today-col .wdn { color:var(--ink); font-weight:600; }
  .week-day-head.today-col .wdd { background:var(--ink); color:var(--paper); border-radius:50%; width:2rem; height:2rem; display:inline-flex; align-items:center; justify-content:center; font-size:1rem; }
  .allday-row { display:flex; border-bottom:0.5px solid var(--hair); flex-shrink:0; min-height:28px; }
  .allday-gutter { width:56px; flex-shrink:0; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; font-size:0.68rem; color:var(--ink-3); }
  .allday-cols { flex:1; display:grid; }
  .allday-cell { border-left:0.5px solid var(--hair); padding:2px; display:flex; flex-direction:column; gap:2px; }
  .allday-block-pill { font-size:0.71rem; padding:0.1rem 0.35rem; background:#e0e7ff; color:#3730a3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
  .week-scroll { flex:1; overflow-y:auto; position:relative; }
  .week-grid { display:flex; position:relative; }
  .time-col { width:56px; flex-shrink:0; }
  .hour-label { height:64px; display:flex; align-items:flex-start; justify-content:flex-end; padding-right:8px; padding-top:3px; font-size:0.68rem; color:var(--ink-3); font-variant-numeric:tabular-nums; }
  .day-cols { flex:1; display:grid; position:relative; }
  .day-col { border-left:1px solid var(--hair); position:relative; }
  .day-col.today-bg { background:rgba(0,0,0,0.02); }
  .hour-line { height:64px; border-bottom:1px solid var(--hair); cursor:pointer; }
  .hour-line:hover { background:rgba(0,0,0,.03); }
  .half-line { position:absolute; left:0; right:0; border-top:1px dashed var(--hair); pointer-events:none; }
  .now-line { position:absolute; height:2px; background:var(--accent-red); z-index:5; pointer-events:none; transition:top 1s linear; }
  .now-dot { position:absolute; left:-5px; top:-4px; width:10px; height:10px; border-radius:50%; background:var(--accent-red); box-shadow:0 0 0 2px var(--paper); }

  /* 事件块 */
  .cal-event { position:absolute; padding:3px 6px 3px 7px; cursor:pointer; font-size:0.78rem; overflow:hidden; border-left:3px solid; box-sizing:border-box; z-index:2; transition:filter 0.1s; }
  .cal-event:hover { filter:brightness(0.96); }
  .cal-event .ev-time { font-size:0.67rem; opacity:0.75; white-space:nowrap; line-height:1.4; }
  .cal-event .ev-title { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.4; }
  .cal-event .ev-cust { font-size:0.68rem; opacity:0.75; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }

  /* 弹出卡片 */
  .cal-popup { position:fixed; z-index:1000; background:var(--paper); border:0.5px solid var(--ink); width:340px; max-width:95vw; padding:1rem; display:none; }
  .cal-popup.visible { display:block; }
  .popup-close { position:absolute; top:0.6rem; right:0.75rem; background:none; border:none; font-size:1.1rem; cursor:pointer; color:var(--ink-3); }
  .popup-title { font-size:1.05rem; font-weight:700; margin-bottom:0.2rem; padding-right:1.5rem; }
  .popup-datetime { font-size:0.82rem; color:var(--ink-3); margin-bottom:0.65rem; }
  .popup-badges { display:flex; gap:0.3rem; flex-wrap:wrap; margin-bottom:0.65rem; }
  .popup-badge { padding:0.15rem 0.5rem; font-size:0.72rem; font-weight:600; border:0.5px solid; }
  .popup-row { display:flex; gap:0.4rem; align-items:flex-start; margin-bottom:0.3rem; font-size:0.85rem; }
  .popup-label { color:var(--ink-3); white-space:nowrap; flex-shrink:0; min-width:48px; }
  .popup-val { flex:1; word-break:break-all; }
  .popup-notes { background:var(--bg); padding:0.4rem 0.6rem; font-size:0.82rem; color:var(--ink-3); margin:0.4rem 0; }
  .popup-actions { display:flex; gap:0.35rem; flex-wrap:wrap; margin-top:0.65rem; align-items:center; }
  .popup-actions button { padding:0.3rem 0.65rem; border:0.5px solid var(--hair); cursor:pointer; font-size:0.82rem; background:var(--paper); color:var(--ink); }
  .popup-actions button:hover { background:var(--bg); }
  .popup-actions .btn-arrived { background:var(--accent-green); color:var(--paper); border-color:var(--accent-green); }
  .popup-actions .btn-noshow { background:var(--accent-amber); color:var(--paper); border-color:var(--accent-amber); }
  .popup-actions .btn-cancel { background:var(--paper); color:var(--accent-red); border-color:var(--accent-red); }
  .popup-actions .btn-edit { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .popup-created { font-size:0.72rem; color:var(--ink-3); margin-left:auto; }

  /* 改约 modal */
  .cal-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:1100; align-items:center; justify-content:center; }
  .cal-modal-overlay.visible { display:flex; }
  .cal-modal { background:var(--paper); border:0.5px solid var(--ink); padding:1.25rem; width:360px; max-width:95vw; }
  .cal-modal h3 { margin:0 0 0.85rem; font-size:1rem; }
  .cal-modal label { font-size:0.82rem; color:var(--ink-3); display:block; margin-bottom:0.2rem; }
  .cal-modal input { width:100%; margin-bottom:0.65rem; }
  .cal-modal .modal-btns { display:flex; gap:0.5rem; margin-top:0.5rem; }

  /* 新建选择 modal */
  .create-choice { display:flex; gap:0.6rem; margin:0.75rem 0; }
  .create-choice-btn { flex:1; padding:0.85rem 0.4rem; border:0.5px solid var(--hair); cursor:pointer; text-align:center; background:var(--paper); color:var(--ink); font-size:0.85rem; line-height:1.4; white-space:nowrap; }
  .create-choice-btn:hover { background:var(--bg); border-color:var(--ink); }
  .create-choice-btn .icon { font-size:1.5rem; display:block; margin-bottom:0.25rem; }

  /* 修复 cal-modal 关闭按钮 + 标题分割线 */
  body .cal-modal h3 {
    font-family: var(--font-serif); font-size: 11pt !important;
    letter-spacing: 2.5px; font-weight: 700;
    border-bottom: 0.5px solid var(--ink) !important;
    padding-bottom: 8px !important; margin: 0 0 14px !important;
  }
  body #create-modal .cal-modal > button:last-child,
  body .cal-modal > button:last-child[onclick*="close"] {
    background: var(--paper) !important; color: var(--ink-2) !important;
    border: 0.5px solid var(--hair) !important; border-radius: 0 !important;
    padding: 6px 18px !important;
    font-family: var(--font-serif); font-size: 9.5pt !important;
    letter-spacing: 1.5px; font-style: italic; font-weight: 400;
    cursor: pointer; margin-top: 8px;
    float: right;
  }
  body #create-modal .cal-modal > button:last-child:hover {
    color: var(--ink) !important; border-color: var(--ink-3) !important;
  }

  /* Toast */
  .cal-toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(60px); background:var(--ink); color:var(--paper); padding:0.5rem 1.2rem; font-size:0.88rem; z-index:2000; transition:transform 0.25s ease; pointer-events:none; }
  .cal-toast.show { transform:translateX(-50%) translateY(0); }

  /* 事件颜色变量（保留旧版彩色，跟看板一致） */
  :root {
    --c-tnr-bg:#dcfce7; --c-tnr-bd:#16a34a; --c-tnr-tx:#166534;
    --c-surg-bg:#ffedd5; --c-surg-bd:#ea580c; --c-surg-tx:#9a3412;
    --c-out-bg:#ede9fe; --c-out-bd:#7c3aed; --c-out-tx:#5b21b6;
    --c-wash-bg:#dbeafe; --c-wash-bd:#2563eb; --c-wash-tx:#1e40af;
    --c-beauty-bg:#fce7f3; --c-beauty-bd:#db2777; --c-beauty-tx:#9d174d;
  }

  /* ── 顶部工具栏 UK 化 ── */
  body .cal-topbar {
    background: var(--paper) !important;
    border-bottom: 0.5px solid var(--ink) !important;
    padding: 12px 16px !important;
    gap: 14px !important;
  }
  body .cal-topbar .new-btn {
    background: var(--ink) !important; color: var(--paper) !important;
    border: 0 !important; border-radius: 0 !important;
    font-family: var(--font-serif); font-size: 10pt !important;
    letter-spacing: 2px; font-weight: 700;
    padding: 8px 18px !important;
    display: inline-flex !important; align-items: center !important;
    gap: 6px !important; line-height: 1.3 !important;
  }
  body .cal-topbar .new-btn:hover { background: #000 !important; }
  body .cal-topbar .new-btn i[data-lucide],
  body .cal-topbar .new-btn svg {
    width: 13px !important; height: 13px !important;
    vertical-align: middle !important; display: inline-block !important;
    flex-shrink: 0;
  }
  body .cal-nav button {
    background: var(--paper) !important; color: var(--ink-2) !important;
    border: 0.5px solid var(--hair) !important; border-radius: 0 !important;
    font-family: var(--font-serif); font-size: 11pt;
    padding: 4px 10px !important; line-height: 1.2 !important;
  }
  body .cal-nav button:hover {
    background: var(--bg) !important; color: var(--ink) !important;
    border-color: var(--ink-3) !important;
  }
  body #cal-date-label {
    font-family: var(--font-serif); font-size: 12pt; font-weight: 700;
    color: var(--ink); letter-spacing: 2px; min-width: 140px; text-align: center;
  }
  body .cal-actions .btn,
  body .cal-actions #today-btn {
    background: var(--paper) !important; color: var(--ink-2) !important;
    border: 0.5px solid var(--hair) !important; border-radius: 0 !important;
    font-family: var(--font-serif); font-size: 10pt; letter-spacing: 1px;
    padding: 6px 12px !important; font-style: italic;
  }
  body .cal-actions .btn:hover,
  body .cal-actions #today-btn:hover {
    color: var(--ink) !important; border-color: var(--ink-3) !important;
  }
  body .view-sw {
    display: inline-flex; border: 0.5px solid var(--hair);
  }
  body .view-sw button {
    background: transparent !important; color: var(--ink-2) !important;
    border: 0 !important; border-right: 0.5px solid var(--hair) !important;
    border-radius: 0 !important;
    font-family: var(--font-serif); font-size: 10pt; letter-spacing: 1.5px;
    padding: 6px 14px !important; font-style: italic;
  }
  body .view-sw button:last-child { border-right: 0 !important; }
  body .view-sw button:hover {
    background: var(--bg) !important; color: var(--ink) !important;
  }
  body .view-sw button.active {
    background: var(--ink) !important; color: var(--paper) !important;
    font-weight: 700; font-style: normal;
  }
  body #store-filter {
    background: var(--paper) !important; color: var(--ink) !important;
    border: 0.5px solid var(--hair) !important; border-radius: 0 !important;
    font-family: var(--font-serif); font-size: 10pt;
    padding: 6px 12px !important; outline: 0; min-width: 120px;
  }

  /* ── 弹出卡片 + modal UK 化 ── */
  body .cal-popup, body .cal-modal {
    border-radius: 0 !important; box-shadow: 0 8px 24px rgba(0,0,0,.1) !important;
    border: 0.5px solid var(--ink) !important;
  }
  body .cal-modal h3 {
    font-family: var(--font-serif); letter-spacing: 2px;
    border-bottom: 0.5px solid var(--ink); padding-bottom: 8px;
  }
  body .cal-modal label {
    font-family: var(--font-serif); font-size: 9pt;
    letter-spacing: 2px; color: var(--ink-3); font-style: italic;
  }
  body .cal-modal input, body .cal-modal select, body .cal-modal textarea {
    font-family: var(--font-serif); font-size: 10.5pt;
    border: 0.5px solid var(--hair) !important; border-radius: 0 !important;
    background: var(--paper); color: var(--ink); outline: 0;
    padding: 8px 12px !important; width: 100%; box-sizing: border-box;
  }
  body .cal-modal .btn {
    background: var(--ink); color: var(--paper); border: 0; border-radius: 0;
    padding: 8px 22px; font-family: var(--font-serif); font-size: 10pt;
    letter-spacing: 2px; font-weight: 700;
  }
  body .cal-modal .btn.secondary {
    background: var(--paper); color: var(--ink-2); border: 0.5px solid var(--hair);
    font-style: italic; font-weight: 400;
  }
  body .create-choice-btn {
    background: var(--paper) !important; border: 0.5px solid var(--hair) !important;
    border-radius: 0 !important; padding: 16px !important;
    font-family: var(--font-serif); letter-spacing: 1px;
  }
  body .create-choice-btn:hover {
    background: var(--bg) !important; border-color: var(--ink) !important;
  }
</style>

<div class="cal-breadcrumb">
  <a href="/admin">后台</a>
  <span class="sep">/</span>
  <span>日历</span>
</div>

{% include "includes/admin_calendar_body.html" %}

{% endblock %}
