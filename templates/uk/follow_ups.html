{% extends "uk/_base.html" %}
{% block title %}回访管理 · 大风动物医院{% endblock %}
{% block body %}
<style>
  .fu-bc { font-size:9pt; letter-spacing:2.5px; color:var(--ink-3); margin:24px 0 16px; font-style:italic; }
  .fu-bc a { color:var(--ink-3); border-bottom:0.5px solid transparent; }
  .fu-bc a:hover { color:var(--ink); border-bottom-color:var(--ink-3); }
  .fu-bc .sep { margin:0 8px; color:var(--ink-4); }
  hr.fu-rule-double { border:0; height:4px; border-top:0.5px solid var(--ink); border-bottom:0.5px solid var(--ink); margin:18px 0 28px; }
  .fu-head { display:flex; justify-content:space-between; align-items:flex-end; gap:24px; margin-bottom:8px; }
  .fu-head h1 { font-family:var(--font-serif); font-size:28pt; font-weight:700; color:var(--ink); letter-spacing:1px; margin:0; line-height:1.15; }
  .fu-head h1 .sub { display:block; font-size:10pt; font-weight:400; font-style:italic; color:var(--ink-3); letter-spacing:2px; margin-top:10px; }
  .fu-btn { background:var(--ink); color:var(--paper); border:0; padding:8px 18px; cursor:pointer; font-family:var(--font-serif); font-size:10pt; letter-spacing:2px; font-weight:700; text-decoration:none; display:inline-block; }
  .fu-btn.ghost { background:var(--paper); color:var(--ink-2); border:0.5px solid var(--hair); font-style:italic; font-weight:400; }
  .fu-btn.ghost:hover { color:var(--ink); border-color:var(--ink-3); background:var(--bg); }

  body .page-head { display:none !important; }
  body .msg.ok { border:0; border-left:3px solid var(--accent-green); background:#f5f9f6; padding:10px 16px; margin-bottom:18px; font-family:var(--font-serif); font-size:10pt; color:var(--ink-2); border-radius:0; }
  body .uk-wrap .btn, body .uk-wrap button[type=submit], body .uk-wrap form button { border-radius:0 !important; font-family:var(--font-serif) !important; }
  body .btn { background:var(--ink) !important; color:var(--paper) !important; border:0 !important; padding:8px 18px !important; font-size:10pt !important; letter-spacing:2px !important; font-weight:700 !important; }
  body .btn.secondary { background:var(--paper) !important; color:var(--ink-2) !important; border:0.5px solid var(--hair) !important; font-style:italic; font-weight:400 !important; }
  body .btn.secondary:hover { color:var(--ink) !important; border-color:var(--ink-3) !important; background:var(--bg) !important; }

  body .fu-tabs { display:flex; gap:0; border-bottom:0.5px solid var(--hair); margin:14px 0 18px; flex-wrap:nowrap !important; align-items:center; }
  body .fu-tab { background:transparent !important; color:var(--ink-3) !important; padding:10px 22px !important; border-radius:0 !important; border-bottom:1px solid transparent; margin-bottom:-1px; font-family:var(--font-serif); font-size:11pt; letter-spacing:1.5px; white-space:nowrap; }
  body .fu-tab:hover { color:var(--ink) !important; }
  body .fu-tab.active { background:transparent !important; color:var(--ink) !important; border-bottom-color:var(--ink); font-weight:700; }
  body .fu-tab .badge { background:var(--bg) !important; color:var(--ink-2) !important; font-family:var(--font-numeric); border:0.5px solid var(--hair); padding:0 6px; border-radius:0; font-size:9pt; margin-left:4px; }
  body .fu-tab.active .badge { background:var(--ink) !important; color:var(--paper) !important; border-color:var(--ink); }
  body .fu-mine-toggle { font-family:var(--font-serif); font-style:italic; color:var(--ink-3); font-size:10pt; margin-left:auto !important; margin-top:0 !important; flex-basis:auto !important; display:inline-flex !important; align-items:center; gap:6px; white-space:nowrap; padding:10px 0; }

  body .data-table-wrap { border:0.5px solid var(--hair-2); border-radius:0; background:var(--paper); }
  body .data-table { width:100%; border-collapse:collapse; font-family:var(--font-serif); }
  body .data-table thead th { font-size:9pt; letter-spacing:2px; color:var(--ink-3); font-weight:400; font-style:italic; border-bottom:0.5px solid var(--ink) !important; padding:10px 12px !important; text-align:left; background:var(--paper); }
  body .data-table tbody td { font-size:10pt; color:var(--ink-2); border-bottom:0.5px solid var(--hair) !important; padding:12px !important; vertical-align:top; }
  body .data-table tbody tr:hover td { background:var(--bg); }

  body .pill { border-radius:0 !important; font-family:var(--font-serif); font-style:italic; font-size:9pt; padding:2px 10px; border:0.5px solid var(--hair); color:var(--ink-2); background:var(--paper); }
  body .fu-status-pill { border-radius:0 !important; font-family:var(--font-serif); font-style:italic; font-size:9pt; padding:2px 10px; border:0.5px solid var(--hair); background:var(--paper); }
  body .fu-status-pill.pending, body .fu-status-pill.phone_pending { color:var(--accent-amber); border-color:var(--accent-amber); background:#fbfaf6; }
  body .fu-status-pill.due { color:var(--accent-red); border-color:var(--accent-red); background:#fcf5f4; }
  body .fu-status-pill.sent { color:var(--ink); border-color:var(--ink-3); background:var(--bg); }
  body .fu-status-pill.responded { color:var(--accent-green); border-color:var(--accent-green); background:#f5f9f6; }
  body .fu-status-pill.closed, body .fu-status-pill.skipped { color:var(--ink-3); border-color:var(--hair); }
  body .fu-overdue { color:var(--accent-red); font-weight:700; font-family:var(--font-numeric); }

  body .fu-row-actions { display:flex !important; flex-wrap:wrap; gap:4px; justify-content:flex-end; align-items:flex-start; }
  body .fu-row-actions form { display:inline-block; margin:0; }
  body .fu-row-actions > * { flex:0 0 auto; }
  body .fu-action-btn {
    border-radius:0 !important;
    font-family:var(--font-serif) !important;
    background:var(--paper) !important;
    border:0.5px solid var(--hair) !important;
    color:var(--ink-2) !important;
    font-style:italic;
    font-weight:400 !important;
    font-size:8.5pt !important;
    padding:3px 8px !important;
    margin:0 !important;
    white-space:nowrap;
    line-height:1.4;
    display:inline-flex !important;
    align-items:center !important;
    gap:3px;
    height:24px;
    box-sizing:border-box;
  }
  body .fu-action-btn i, body .fu-action-btn svg { width:11px !important; height:11px !important; flex-shrink:0; stroke-width:1.5; }
  body .fu-action-btn:hover { color:var(--ink) !important; border-color:var(--ink-3) !important; background:var(--bg) !important; }
  body .fu-action-btn.primary { background:var(--ink) !important; color:var(--paper) !important; border:0.5px solid var(--ink) !important; font-style:normal !important; font-weight:700 !important; }
  body .fu-action-btn.warn { background:var(--paper) !important; color:var(--accent-amber) !important; border:0.5px solid var(--accent-amber) !important; }
  body .fu-action-btn.danger { background:var(--paper) !important; color:var(--accent-red) !important; border:0.5px solid var(--accent-red) !important; }

  body .empty-card { background:var(--paper); border:0.5px solid var(--hair-2); border-radius:0; padding:48px 20px; text-align:center; font-family:var(--font-serif); font-style:italic; color:var(--ink-3); font-size:11pt; }
  body .empty-icon { display:none; }
</style>

<div class="fu-bc"><a href="/admin">后台</a><span class="sep">/</span><span>回访管理</span></div>

<div class="fu-head">
  <div>
    <h1>回&nbsp;访&nbsp;管&nbsp;理
      <span class="sub">按诊断自动衍生 · 模板化反馈 · 客户反馈自动闭环</span>
    </h1>
  </div>
  <div>
    <a href="/admin/follow-up-templates" class="fu-btn ghost">回&nbsp;访&nbsp;模&nbsp;板</a>
  </div>
</div>

<hr class="fu-rule-double"/>

{% include "includes/admin_follow_ups_body.html" %}
{% endblock %}
