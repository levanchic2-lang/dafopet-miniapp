{% extends "uk/_base.html" %}
{% block title %}TNR 审核与手术登记 · 大风动物医院{% endblock %}

{% block body %}

<style>
  /* UK 头 */
  .tnr-breadcrumb {
    font-size: 9pt; letter-spacing: 2.5px; color: var(--ink-3);
    margin: 24px 0 16px; font-style: italic;
  }
  .tnr-breadcrumb a { color: var(--ink-3); border-bottom: 0.5px solid transparent; }
  .tnr-breadcrumb a:hover { color: var(--ink); border-bottom-color: var(--ink-3); }
  .tnr-breadcrumb .sep { margin: 0 8px; color: var(--ink-4); }

  .tnr-head h1 {
    font-family: var(--font-serif); font-size: 28pt; font-weight: 700;
    color: var(--ink); letter-spacing: 1px; margin: 0; line-height: 1.15;
  }
  .tnr-head h1 .sub {
    display: block; font-size: 10pt; font-weight: 400; font-style: italic;
    color: var(--ink-3); letter-spacing: 2px; margin-top: 8px;
  }
  hr.tnr-rule-double {
    border: 0; height: 4px;
    border-top: 0.5px solid var(--ink);
    border-bottom: 0.5px solid var(--ink);
    margin: 18px 0 28px;
  }

  /* ── 覆盖 admin.html 的旧 class ── */
  /* 隐藏老 .page-head（我们自己写新头）+ msg 顶 */
  body .page-head { display: none !important; }

  /* 信息 msg 条 */
  body .msg.ok {
    border: 0; border-left: 3px solid var(--accent-green);
    background: #f5f9f6; padding: 10px 16px; margin-bottom: 18px;
    font-family: var(--font-serif); font-size: 10pt; letter-spacing: 0.5px;
    border-radius: 0; color: var(--ink-2);
  }
  body .msg.err {
    border: 0; border-left: 3px solid var(--accent-red);
    background: #fcf5f4; padding: 10px 16px; margin-bottom: 18px;
    font-family: var(--font-serif); font-size: 10pt; letter-spacing: 0.5px;
    border-radius: 0; color: var(--accent-red);
  }

  /* card 通用 → UK 风 */
  body .card {
    background: var(--paper); border: 0.5px solid var(--hair-2);
    border-radius: 0; box-shadow: none;
    padding: 18px 22px; margin-bottom: 18px;
  }

  /* 筛选表单 inputs */
  body .card label {
    font-family: var(--font-serif); font-size: 9pt;
    letter-spacing: 2px; color: var(--ink-3); font-style: italic;
    display: block; margin-bottom: 4px;
  }
  body .card input[type=text], body .card input[type=date], body .card input[type=time],
  body .card input[type=number], body .card select, body .card textarea {
    font-family: var(--font-serif); font-size: 10.5pt;
    border: 0.5px solid var(--hair) !important; border-radius: 0 !important;
    padding: 8px 12px !important;
    background: var(--paper); color: var(--ink); outline: 0;
    width: 100%; box-sizing: border-box;
    height: 38px;
  }
  body .card textarea { height: auto; min-height: 70px; line-height: 1.6; }
  body .card input:focus, body .card select:focus, body .card textarea:focus {
    border-color: var(--ink) !important; box-shadow: none !important;
  }

  /* 按钮 */
  body .card button[type=submit], body .card .btn {
    background: var(--ink); color: var(--paper); border: 0; border-radius: 0;
    padding: 8px 22px; cursor: pointer;
    font-family: var(--font-serif); font-size: 10pt;
    letter-spacing: 2px; font-weight: 700;
    width: auto; height: auto;
  }
  body .card .btn.secondary {
    background: var(--paper); color: var(--ink-2); border: 0.5px solid var(--hair);
    font-style: italic; font-weight: 400;
  }
  body .card .btn.danger, body .card .danger {
    background: var(--paper); color: var(--accent-red); border: 0.5px solid var(--accent-red);
    border-radius: 0;
  }

  /* admin-filter-actions */
  body .admin-filter-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 14px; padding-top: 12px; border-top: 0.5px solid var(--hair);
    font-family: var(--font-serif); font-size: 10pt;
  }
  body .admin-filter-actions .admin-filter-check {
    display: flex; gap: 8px; align-items: center; cursor: pointer;
    color: var(--ink-2); font-style: italic;
  }
  body .admin-filter-actions .admin-filter-check input { width: 16px; height: 16px; cursor: pointer; }
  body .admin-filter-actions .admin-query-btn {
    background: var(--ink); color: var(--paper); border: 0;
    padding: 8px 28px; cursor: pointer; border-radius: 0;
    font-family: var(--font-serif); font-size: 10.5pt;
    letter-spacing: 2.5px; font-weight: 700;
  }
  body .admin-filter-actions .admin-query-btn:hover { background: #000; }

  /* 统计 + pills */
  body .card > div[style*="border-top"] {
    border-top: 0.5px solid var(--hair) !important;
    padding-top: 14px !important;
    font-family: var(--font-serif);
  }
  body .card > div[style*="border-top"] strong {
    font-family: var(--font-numeric); color: var(--ink) !important;
    font-size: 12pt !important;
  }

  /* pills */
  body .pill {
    border-radius: 0 !important; font-family: var(--font-serif);
    font-style: italic; font-size: 9pt; padding: 2px 10px;
    border: 0.5px solid var(--hair); letter-spacing: 1px; font-weight: 400;
    background: var(--paper); color: var(--ink-2);
  }
  body .pill.pill-warn   { color: var(--accent-amber); border-color: var(--accent-amber); }
  body .pill.pill-ok     { color: var(--accent-green); border-color: var(--accent-green); }
  body .pill.pill-info   { color: var(--ink); border-color: var(--ink-3); }
  body .pill.pill-no     { color: var(--accent-red); border-color: var(--accent-red); }
  body .pill.pill-gray   { color: var(--ink-3); border-color: var(--hair); }

  /* apps grid */
  body .apps-grid {
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px; margin-top: 18px;
  }
  @media (max-width: 1100px) { body .apps-grid { grid-template-columns: 1fr; } }
  body .apps-grid > .card {
    padding: 18px 22px;
  }
  body .apps-grid h2 {
    font-family: var(--font-serif); font-size: 13pt; font-weight: 700;
    color: var(--ink); letter-spacing: 1px;
  }
  body .apps-grid h2 a {
    color: var(--ink); border-bottom: 0.5px solid var(--ink-3); padding-bottom: 1px;
  }
  body .apps-grid .admin-app-meta {
    font-family: var(--font-numeric); font-size: 9pt;
    color: var(--ink-3); font-style: italic;
  }

  /* ── 申请卡内部布局（原 admin.html extra_css 漏迁的） ── */
  body .admin-app-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; flex-wrap: wrap;
  }
  body .admin-app-lines p {
    margin: 6px 0 0; font-family: var(--font-serif); font-size: 10pt;
    color: var(--ink-2); line-height: 1.6;
  }
  body .admin-app-lines p.sub {
    margin: 0; font-size: 10pt; color: var(--ink-3); font-style: italic;
  }
  body .admin-app-meta {
    font-family: var(--font-numeric); font-size: 9pt;
    color: var(--ink-3); font-style: italic; white-space: nowrap;
  }

  /* 申请素材缩略图 — 76×76 hairline 网格 */
  body .admin-app-thumb-row { margin-top: 12px; }
  body .admin-app-thumb-label {
    display: block; margin-bottom: 6px;
    font-family: var(--font-serif); font-size: 9pt;
    letter-spacing: 1.5px; color: var(--ink-3); font-style: italic;
  }
  body .admin-app-thumb-wrap {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start;
  }
  body a.admin-app-thumb {
    display: block !important;
    width: 76px !important; height: 76px !important;
    border: 0.5px solid var(--hair) !important; border-radius: 0 !important;
    overflow: hidden; background: var(--bg);
    flex-shrink: 0; text-decoration: none; box-sizing: border-box;
  }
  body a.admin-app-thumb:hover { border-color: var(--ink) !important; }
  body a.admin-app-thumb img {
    width: 100% !important; height: 100% !important;
    object-fit: cover !important; display: block !important;
  }

  /* AI 辅助审核细节 */
  body .ai-review-details summary {
    user-select: none; font-family: var(--font-serif);
    color: var(--ink-2); letter-spacing: 1.5px; cursor: pointer;
  }
  body .ai-review-block { margin-top: 10px; }
  body .ai-review-block:first-child { margin-top: 0; }
  body .ai-review-v { margin: 0; font-family: var(--font-serif); font-size: 10pt; }
  body .ai-review-list { margin: 4px 0 0; padding-left: 20px; }
  body .ai-review-list li { margin: 3px 0; }

  /* admin-actions: 上传术前后 + 审核 区域 */
  body .admin-actions {
    margin-top: 14px; border-top: 0.5px solid var(--hair);
    padding-top: 14px; display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  body .admin-actions-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    align-items: start;
  }
  @media (max-width: 720px) {
    body .admin-actions-row { grid-template-columns: 1fr; }
    body .admin-app-meta { white-space: normal; }
  }
  body .admin-form-line {
    display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;
  }
  body .admin-form-line input { width: 100%; }
  body .admin-form-line button { white-space: nowrap; }
  body .admin-form-stack { display: grid; gap: 8px; }

  /* 拒绝原因 box */
  body .card div[style*="fff1f0"] {
    background: #fcf5f4 !important; border: 0 !important;
    border-left: 3px solid var(--accent-red) !important;
    border-radius: 0 !important; padding: 10px 14px !important;
  }
  body .card div[style*="fff1f0"] span[style*="b91c1c"],
  body .card div[style*="fff1f0"] span[style*="7f1d1d"] {
    color: var(--accent-red) !important;
  }

  /* ── 上传术前/术后影像 区（漏迁的 admin-upload* 样式） ── */
  body .admin-upload {
    margin-top: 14px; padding-top: 14px;
    border-top: 0.5px solid var(--hair);
  }
  body .admin-upload p {
    font-family: var(--font-serif); font-size: 10pt; margin: 0 0 8px;
  }
  body .admin-upload-grid {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 10px 16px !important;
    max-width: none;
  }
  @media (max-width: 720px) { body .admin-upload-grid { grid-template-columns: 1fr !important; } }
  body .admin-upload-grid label {
    margin: 0; font-weight: 700;
    font-family: var(--font-serif); font-size: 10pt;
    color: var(--ink); letter-spacing: 1px;
    display: flex; flex-direction: column; gap: 4px;
    font-style: normal;
  }
  body .admin-upload-grid label input[type=file] {
    height: auto !important; padding: 6px 8px !important;
    font-size: 9pt !important; cursor: pointer;
    border: 0.5px solid var(--hair) !important; border-radius: 0 !important;
    background: var(--bg) !important;
  }
  body .admin-upload-submit {
    width: auto !important; margin-top: 12px;
    background: var(--ink) !important; color: var(--paper) !important;
    border: 0 !important; padding: 6px 18px !important;
    font-family: var(--font-serif); font-size: 9.5pt !important;
    letter-spacing: 2px; font-weight: 700;
  }
  body .admin-upload-submit:hover { background: #000 !important; }

  /* 申请卡内 details 的 '修改' 小按钮 — 缩字号 + 缩 icon */
  body .admin-app-lines details summary {
    font-size: 8.5pt !important; color: var(--ink-3) !important;
    font-family: var(--font-serif); font-style: italic;
    letter-spacing: 0.5px;
  }
  body .admin-app-lines details summary i[data-lucide],
  body .admin-app-lines details summary svg {
    width: 11px !important; height: 11px !important;
    vertical-align: -1px;
  }

  /* 已上传缩略图区域 */
  body .admin-upload .sub {
    font-family: var(--font-serif); font-size: 9.5pt;
    color: var(--ink-3); font-style: italic; letter-spacing: 0.5px;
  }

  /* 申请卡 .admin-app-lines p 紧凑化 */
  body .admin-app-lines p { margin: 5px 0 0 !important; }

  /* 公开展示开关 row — 扁化 + 图标对齐 */
  body .card > div[style*="ok-bg"],
  body .card > div[style*="warn-bg"] {
    background: var(--bg) !important;
    border: 0 !important;
    border-left: 3px solid var(--accent-green) !important;
    border-radius: 0 !important;
    padding: 6px 12px !important;
    margin: 8px 0 !important;
    min-height: 0 !important;
  }
  body .card > div[style*="warn-bg"] {
    border-left-color: var(--accent-amber) !important;
  }
  body .card > div[style*="ok-bg"] > div,
  body .card > div[style*="warn-bg"] > div {
    font-size: 9.5pt !important; font-family: var(--font-serif);
    color: var(--ink-2) !important; line-height: 1.4 !important;
    display: inline-flex; align-items: center; gap: 6px;
  }
  body .card > div[style*="ok-bg"] > div strong { color: var(--accent-green) !important; }
  body .card > div[style*="warn-bg"] > div strong { color: var(--accent-amber) !important; }
  body .card > div[style*="ok-bg"] .btn,
  body .card > div[style*="warn-bg"] .btn {
    background: var(--paper) !important; color: var(--ink-2) !important;
    border: 0.5px solid var(--hair) !important; border-radius: 0 !important;
    padding: 4px 10px !important;
    font-family: var(--font-serif); font-size: 9pt !important;
    letter-spacing: 1px; font-style: italic; font-weight: 400;
    display: inline-flex !important; align-items: center !important;
    gap: 4px !important; line-height: 1.3 !important;
  }
  body .card > div[style*="ok-bg"] .btn:hover,
  body .card > div[style*="warn-bg"] .btn:hover {
    color: var(--ink) !important; border-color: var(--ink-3) !important;
  }
  body .card > div[style*="ok-bg"] i[data-lucide],
  body .card > div[style*="ok-bg"] svg,
  body .card > div[style*="warn-bg"] i[data-lucide],
  body .card > div[style*="warn-bg"] svg {
    width: 13px !important; height: 13px !important;
    vertical-align: middle !important; display: inline-block !important;
    flex-shrink: 0;
  }

  /* 现场确认按钮 cell — 扁化 + 图标对齐 */
  body .card > div[style*="brand-bg-soft"] {
    background: var(--bg) !important;
    border: 0 !important;
    border-left: 3px solid var(--ink) !important;
    border-radius: 0 !important;
    padding: 6px 12px !important;
    margin: 8px 0 !important;
    min-height: 0 !important;
  }
  body .card > div[style*="brand-bg-soft"] > div {
    font-size: 9.5pt !important; font-family: var(--font-serif);
    color: var(--ink-2) !important; line-height: 1.4 !important;
    display: inline-flex; align-items: center; gap: 6px;
  }
  body .card > div[style*="brand-bg-soft"] .btn {
    background: var(--ink) !important; color: var(--paper) !important;
    border: 0 !important; border-radius: 0 !important;
    padding: 5px 12px !important;
    font-family: var(--font-serif); letter-spacing: 1.5px;
    font-size: 9.5pt !important;
    display: inline-flex !important; align-items: center !important;
    gap: 6px !important; line-height: 1.4 !important;
  }
  /* lucide icon 对齐：去掉 baseline → 改 center */
  body .card > div[style*="brand-bg-soft"] i[data-lucide],
  body .card > div[style*="brand-bg-soft"] svg {
    width: 14px !important; height: 14px !important;
    vertical-align: middle !important;
    display: inline-block !important;
    flex-shrink: 0;
  }

  /* 审核 textarea */
  body .admin-action-card input[type=text] {
    height: 38px;
  }

  /* admin-action-card 审核 row */
  body .admin-form-line {
    grid-template-columns: 1fr auto !important;
    gap: 10px !important;
  }
  body .admin-form-line button {
    background: var(--paper) !important; color: var(--accent-red) !important;
    border: 0.5px solid var(--accent-red) !important; border-radius: 0 !important;
    padding: 8px 18px !important;
    font-family: var(--font-serif); font-size: 10pt;
    letter-spacing: 1.5px; font-weight: 400;
  }
  body .admin-form-line button:hover { background: #fcf5f4 !important; }

  /* AI 辅助 panel */
  body .ai-review-panel {
    background: var(--bg); border: 0; border-radius: 0;
    border-left: 3px solid var(--ink-3);
    font-family: var(--font-serif); font-size: 10pt;
  }
  body .ai-review-k {
    font-family: var(--font-serif); color: var(--ink-3); font-style: italic;
    letter-spacing: 1.5px; font-weight: 400;
  }
  body .ai-review-footnote { border-top: 0.5px solid var(--hair); color: var(--ink-3); font-style: italic; }

  /* 危险操作 details */
  body .card[style*="bg-elevated"] {
    background: #fbfaf6 !important; border-color: var(--accent-amber) !important;
  }
  body .card details summary {
    font-family: var(--font-serif); letter-spacing: 1.5px;
    color: var(--accent-amber) !important;
  }

  /* admin-action-card */
  body .admin-action-card {
    background: var(--paper); border: 0.5px solid var(--hair-2); border-radius: 0;
  }
  body .admin-action-title {
    font-family: var(--font-serif); letter-spacing: 2px;
    font-size: 9pt !important; color: var(--ink-3) !important;
    font-style: italic; font-weight: 400 !important;
    margin: 0 0 6px !important;
  }

  /* row2 grid */
  body .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* sub text */
  body .sub { font-family: var(--font-serif); font-style: italic; color: var(--ink-3); }

  /* 数据筛选行 grid */
  body .tnr-filter-grid {
    gap: 12px 16px !important;
  }
</style>

<div class="tnr-breadcrumb">
  <a href="/admin">后台</a>
  <span class="sep">/</span>
  <span>TNR 审核</span>
</div>

<div class="tnr-head">
  <h1>
    TNR 审核与手术登记
    <span class="sub">处理申请 · 到院核对 · 上传术前后资料 · 标记公开展示同意</span>
  </h1>
</div>

<hr class="tnr-rule-double"/>

{% include "includes/admin_tnr_body.html" %}

{% endblock %}
