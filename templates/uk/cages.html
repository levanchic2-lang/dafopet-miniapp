{% extends "uk/_base.html" %}
{% block title %}笼位管理 · 大风动物医院{% endblock %}
{% block body %}
<style>{% include "uk/_chrome.css" %}
/* 笼位特定 */
.uk-wrap .cage-tile { display:flex; align-items:center; gap:10px; padding:10px 14px; border:0.5px solid var(--hair); border-radius:0; background:var(--paper); font-family:var(--font-serif); }
.uk-wrap .cage-tile.occupied { background:#fbfaf6; border-color:var(--accent-amber); }
.uk-wrap .cage-code { font-family:var(--font-numeric); font-weight:700; font-size:11pt; color:var(--ink); }
.uk-wrap .cage-kind-tag { font-family:var(--font-serif); font-style:italic; font-size:9pt; padding:2px 10px; border-radius:0; background:var(--bg); color:var(--ink); border:0.5px solid var(--hair); letter-spacing:1.5px; }
.uk-wrap .cage-kind-tag.iso { background:#fcf5f4; color:var(--accent-red); border-color:var(--accent-red); }
.uk-wrap .cage-kind-tag.icu { background:var(--bg); color:var(--ink); border-color:var(--ink-3); }
.uk-wrap .cage-row { display:grid; grid-template-columns:96px 1fr 110px 70px 80px 150px; gap:8px; align-items:center; padding:10px 14px; border-bottom:0.5px solid var(--hair); font-family:var(--font-serif); }
.uk-wrap .rr-row { display:grid; grid-template-columns:1fr 96px 100px 64px 150px; gap:8px; align-items:center; padding:10px 14px; border-bottom:0.5px solid var(--hair); font-family:var(--font-serif); }
.uk-wrap .store-tag { display:inline-block; font-family:var(--font-serif); font-style:italic; font-size:8.5pt; padding:1px 8px; background:var(--bg); color:var(--ink-2); border:0.5px solid var(--hair); letter-spacing:1px; }
.uk-wrap .rr-row.head { font-size:9pt; letter-spacing:2px; color:var(--ink-3); font-style:italic; border-bottom:0.5px solid var(--ink); }
.uk-wrap .rr-row input { font-family:var(--font-serif) !important; font-size:10pt !important; padding:5px 8px !important; border:0.5px solid var(--hair) !important; border-radius:0 !important; background:var(--paper) !important; }
.uk-wrap .cage-row.head { background:var(--paper); font-family:var(--font-serif); font-size:9pt; letter-spacing:2px; color:var(--ink-3); font-style:italic; font-weight:400; border-bottom:0.5px solid var(--ink); border-radius:0; }
.uk-wrap .cage-row input, .uk-wrap .cage-row select { font-family:var(--font-serif) !important; font-size:10pt !important; padding:5px 8px !important; border:0.5px solid var(--hair) !important; border-radius:0 !important; background:var(--paper) !important; }
</style>
<div class="ukc-bc">
  <a href="/admin">后台</a><span class="sep">/</span>
  <a href="/admin/inpatient">住院管理</a><span class="sep">/</span>
  <span>笼位管理</span>
</div>
<div class="ukc-head">
  <div>
    <h1>笼&nbsp;位&nbsp;管&nbsp;理
      <span class="sub">笼号 / 类型 / 编号维护 · 日费率改用「费率规则」参考，住院时手填</span>
    </h1>
  </div>
</div>
<hr class="ukc-rule-double"/>
{% include "includes/admin_cages_body.html" %}
{% endblock %}
