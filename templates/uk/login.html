<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or '医院后台登录' }} · 大风动物医院</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc@5.2.9/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc@5.2.9/700.css">
  <script>
  (function(){
    if (!document.fonts || !document.fonts.ready) return;
    var html = document.documentElement;
    html.style.visibility = 'hidden';
    var shown = false;
    var show = function(){ if (shown) return; shown = true; html.style.visibility = ''; };
    document.fonts.ready.then(show);
    setTimeout(show, 1500);
  })();
  </script>
  <link rel="stylesheet" href="/static/uk_minimal.css?v=5" />
  <style>
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 24px;
    }
    .lg-card {
      background: var(--paper);
      border: 0.5px solid var(--hair-2);
      width: 100%;
      max-width: 440px;
      padding: 44px 42px 36px;
      box-sizing: border-box;
    }
    .lg-brand {
      text-align: center;
      font-family: var(--font-serif);
      font-size: 22pt;
      letter-spacing: 6px;
      color: var(--ink);
      margin: 0;
    }
    .lg-est {
      text-align: center;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 9.5pt;
      letter-spacing: 3px;
      color: var(--ink-3);
      margin: 8px 0 0;
    }
    .lg-rule {
      border: 0;
      height: 4px;
      border-top: 0.5px solid var(--ink);
      border-bottom: 0.5px solid var(--ink);
      margin: 22px auto 28px;
      width: 60px;
    }
    .lg-title {
      text-align: center;
      font-family: var(--font-serif);
      font-size: 13pt;
      letter-spacing: 3px;
      color: var(--ink);
      font-weight: 700;
      margin: 0 0 22px;
    }
    .lg-err {
      border: 0;
      border-left: 3px solid var(--accent-red);
      background: #fcf5f4;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-family: var(--font-serif);
      font-size: 10pt;
      color: var(--accent-red);
    }
    .lg-field { margin-bottom: 14px; }
    .lg-field label {
      display: block;
      font-family: var(--font-serif);
      font-size: 9pt;
      letter-spacing: 2.5px;
      color: var(--ink-3);
      font-style: italic;
      margin-bottom: 6px;
    }
    .lg-field input {
      width: 100%;
      box-sizing: border-box;
      font-family: var(--font-serif);
      font-size: 11pt;
      color: var(--ink);
      background: var(--paper);
      border: 0.5px solid var(--hair);
      padding: 9px 12px;
      outline: 0;
      height: 40px;
    }
    .lg-field input:focus { border-color: var(--ink); }
    .lg-submit {
      width: 100%;
      background: var(--ink);
      color: var(--paper);
      border: 0;
      padding: 12px 0;
      font-family: var(--font-serif);
      font-size: 11pt;
      letter-spacing: 4px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    .lg-submit:hover { background: #000; }
    .lg-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 26px 0 14px;
      color: var(--ink-3);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 9.5pt;
      letter-spacing: 1.5px;
    }
    .lg-divider::before, .lg-divider::after {
      content: '';
      flex: 1;
      height: 0;
      border-top: 0.5px solid var(--hair);
    }
    .lg-wecom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      box-sizing: border-box;
      padding: 10px 0;
      background: var(--paper);
      color: var(--ink-2);
      border: 0.5px solid var(--hair);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 10.5pt;
      letter-spacing: 2px;
      text-decoration: none;
    }
    .lg-wecom:hover { color: var(--ink); border-color: var(--ink-3); background: var(--bg); }
    .lg-wecom svg { width: 18px; height: 18px; }
    .lg-tip {
      margin: 14px 0 0;
      text-align: center;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 9pt;
      letter-spacing: 1.5px;
      color: var(--ink-3);
    }
    .lg-footer {
      margin-top: 32px;
      text-align: center;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 9pt;
      color: var(--ink-3);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="lg-card">
    <h1 class="lg-brand">大风动物医院</h1>
    <p class="lg-est">est. 始 于 2018</p>
    <hr class="lg-rule"/>
    <p class="lg-title">{{ title or '医院后台登录' }}</p>

    {% if error %}<div class="lg-err">{{ error }}</div>{% endif %}

    <form method="post" action="/admin/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <div class="lg-field">
        <label for="username">用&nbsp;户&nbsp;名</label>
        <input type="text" id="username" name="username" required autocomplete="username" autofocus />
      </div>
      <div class="lg-field">
        <label for="password">密&nbsp;码</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="lg-submit">登&nbsp;录</button>
    </form>

    <div class="lg-divider">或</div>

    <a href="/admin/wecom-login" class="lg-wecom">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 4C4.36 4 1 6.91 1 10.5c0 2.07 1.13 3.91 2.89 5.12-.07.27-.42 1.5-.49 1.75 0 0-.01.07.04.1.05.03.1.01.1.01.34-.05 1.96-1.14 2.24-1.31.81.24 1.68.37 2.59.37l.39-.01a4.6 4.6 0 0 1-.22-1.4c0-3.07 2.97-5.58 6.62-5.58.24 0 .48.01.71.04C15.45 6.27 12.27 4 8.5 4Zm-2.7 5.18c-.55 0-1-.45-1-1s.45-1 1-1c.55 0 1 .45 1 1s-.45 1-1 1Zm5.4 0c-.55 0-1-.45-1-1s.45-1 1-1c.55 0 1 .45 1 1s-.45 1-1 1ZM23 15.05c0-2.98-2.98-5.4-6.65-5.4-3.67 0-6.65 2.42-6.65 5.4 0 2.98 2.98 5.4 6.65 5.4.75 0 1.48-.1 2.16-.29.23.14 1.59 1.04 1.87 1.08 0 0 .04.01.08-.01.04-.02.04-.08.04-.08-.06-.21-.35-1.21-.41-1.43A4.9 4.9 0 0 0 23 15.05Zm-8.99-.75c-.46 0-.83-.37-.83-.83 0-.46.37-.83.83-.83.46 0 .83.37.83.83 0 .46-.37.83-.83.83Zm4.67 0c-.46 0-.83-.37-.83-.83 0-.46.37-.83.83-.83.46 0 .83.37.83.83 0 .46-.37.83-.83.83Z"/></svg>
      用&nbsp;企&nbsp;业&nbsp;微&nbsp;信&nbsp;登&nbsp;录
    </a>
    <p class="lg-tip">请在企业微信内打开本网址使用免密登录</p>

    <p class="lg-footer">非家养猫犬 · 公益绝育 · 免医疗费</p>
  </div>
</body>
</html>
