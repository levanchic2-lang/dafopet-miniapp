<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{{ title }}</title>
  {# ── PWA: 可添加到主屏，全屏运行 ── #}
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#3b8ec1" />
  <meta name="application-name" content="大风" />
  {# iOS Safari 「添加到主屏」 #}
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="大风" />
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
  {# Lucide 图标库 — 全站替代 emoji 用 #}
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  {# 通用语音输入：给 <textarea data-voice="1"> 自动加 🎤 按钮 #}
  <script src="/static/voice_input.js" defer></script>
  {# 体格检查辅助：给 <textarea data-exam-helper="1"> 加模板下拉 + 快捷标签 #}
  <script src="/static/exam_helper.js" defer></script>
  {# 医嘱模板辅助：给 <textarea data-orders-helper="1"> 加 6 类术后/疾病预制模板 #}
  <script src="/static/orders_helper.js" defer></script>
  {# 诊断 autocomplete：给 <textarea name="diagnosis"> 加疾病字典下拉推荐 #}
  <script src="/static/diagnosis_autocomplete.js" defer></script>
  {# 客户上下文 sidebar：给 [data-customer-context] 异步拉钱包/警示/最近就诊等 #}
  <script src="/static/customer_context_sidebar.js" defer></script>
  {# Windows 磁贴 #}
  <meta name="msapplication-TileColor" content="#3b8ec1" />
  <meta name="msapplication-TileImage" content="/static/icon-192.png" />
  <style>
    :root {
      /* ─── 中性色 ──────────────────────────────────── */
      --bg: #fafafa;
      --bg-elevated: #f4f4f5;
      --card: #ffffff;
      --text: #171717;
      --muted: #737373;
      --border: #e5e5e5;
      --border-strong: #d4d4d4;
      --input-border: var(--border-strong);

      /* ─── 品牌色（基于 dafo+ logo 衍生）─────────────── */
      --brand-light: #8bc9e0;   /* logo 原色 — 用作背景 / 描边 / 轻强调 */
      --brand:       #3b8ec1;   /* CTA 主色 — 按钮 / 链接 / 选中状态 */
      --brand-dark:  #2d7aa8;   /* hover / 加深 */
      --brand-fg:    #ffffff;   /* 在 --brand 上的文字色 */
      --brand-bg-soft: #eaf5fa; /* 极浅蓝背景（pill-info / 选中行底纹）*/
      --accent-warm: #f5b942;   /* 暖橙黄（logo 辅助色）— 留给重要徽章 */

      /* 主操作：用品牌色（之前是黑 #262626，现在切到品牌蓝） */
      --accent: var(--brand);
      --accent-hover: var(--brand-dark);

      /* ─── 语义状态色（统一收紧）─────────────────────── */
      --ok-fg:     #15803d;
      --ok-bg:     #dcfce7;
      --warn-fg:   #b45309;
      --warn-bg:   #fef3c7;
      --danger-fg: #b91c1c;
      --danger-bg: #fee2e2;
      --info-fg:   var(--brand-dark);
      --info-bg:   var(--brand-bg-soft);

      /* ─── 圆角 / 阴影 ─────────────────────────────── */
      --radius-sm:   6px;
      --radius:      10px;
      --radius-md:   8px;
      --radius-lg:   14px;
      --radius-pill: 999px;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow:    0 1px 3px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
    }
    /* Lucide 图标默认样式 — 继承文字颜色，根据上下文调整尺寸 */
    .ico { display: inline-block; width: 1em; height: 1em; vertical-align: -.125em; flex-shrink: 0; }
    .ico-sm { width: .85em; height: .85em; }
    .ico-lg { width: 1.25em; height: 1.25em; }
    [data-lucide] { stroke-width: 1.8; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(0, 0, 0, 0.04), transparent),
        radial-gradient(ellipse 80% 50% at 100% 0%, rgba(0, 0, 0, 0.03), transparent);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--text); text-decoration: none; border-bottom: 1px solid transparent; }
    a:hover { border-bottom-color: var(--muted); }
    code {
      font-family: ui-monospace, "Cascadia Code", monospace;
      font-size: 0.88em;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 0.12em 0.4em;
      border-radius: var(--radius-sm);
    }
    .wrap { max-width: none; margin: 0 auto; padding: 1rem 2rem 3rem; }
    /* ── Ribbon 顶部导航 ─────────────────────────────── */
    .ribbon {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0; box-shadow: var(--shadow-xs);
    }
    .ribbon-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.45rem 1.25rem; border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .ribbon-brand { font-weight: 700; font-size: 1.05rem; color: var(--text); letter-spacing: -0.01em;
                     display: inline-flex; align-items: center; gap: .5rem; }
    .ribbon-brand .brand-logo {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--brand-light) url("/static/logo.png") center / 90% no-repeat;
    }
    .ribbon-brand span { color: var(--muted); font-weight: 500; font-size: 0.9rem; margin-left: 0.3rem; }
    .ribbon-user {
      display: flex; align-items: center; gap: 0.75rem; font-size: 0.82rem; color: var(--muted);
    }
    .ribbon-user a { color: var(--muted); font-weight: 500; }
    .ribbon-user a:hover { color: var(--text); }

    /* Tab 大类切换 */
    .ribbon-tabs {
      display: flex; align-items: center; gap: 0;
      padding: 0 1rem; background: #f3f4f6;
      border-bottom: 1px solid var(--border);
    }
    .ribbon-tab {
      padding: 0.5rem 1.2rem; cursor: pointer; font-size: 0.88rem; font-weight: 600;
      color: var(--muted); border: none; background: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: all 0.1s;
    }
    .ribbon-tab:hover { color: var(--text); }
    .ribbon-tab.active {
      color: var(--brand); background: var(--card); border-bottom: 2px solid var(--brand);
    }

    /* 图标按钮区 */
    .ribbon-icons {
      display: none; padding: 0.65rem 1.1rem; gap: 0.4rem; align-items: stretch;
      background: var(--card); overflow-x: auto;
    }
    .ribbon-icons.active { display: flex; }
    .ribbon-icon {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-width: 78px; padding: 0.5rem 0.5rem 0.4rem; border-radius: var(--radius-md);
      cursor: pointer; text-decoration: none; color: var(--text);
      font-size: 0.78rem; font-weight: 500; line-height: 1.3;
      gap: 0.25rem; flex-shrink: 0; transition: background 0.12s;
      position: relative;
    }
    .ribbon-icon:hover { background: var(--brand-bg-soft); color: var(--brand-dark); }
    .ribbon-icon.current {
      background: var(--brand-bg-soft); color: var(--brand-dark); font-weight: 600;
    }
    .ribbon-icon .ri-emoji {
      font-size: 1.5rem; line-height: 1; margin-bottom: 0.15rem;
    }
    .ribbon-icon .ri-badge {
      position: absolute; top: 0.25rem; right: 0.25rem;
      min-width: 1.1em; height: 1.1em; padding: 0 0.3em;
      border-radius: var(--radius-pill); font-size: 0.65rem; font-weight: 800;
      background: #d97706; color: #fff;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    @media (max-width: 720px) {
      .ribbon-icons { padding: 0.5rem 0.6rem; }
      .ribbon-icon { min-width: 62px; padding: 0.4rem 0.3rem 0.3rem; font-size: 0.72rem; }
      .ribbon-icon .ri-emoji { font-size: 1.3rem; }
    }
    /* 待确认徽标 */
    .nav-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 1.15em; height: 1.15em; padding: 0 0.32em;
      border-radius: var(--radius-pill); font-size: 0.72em; font-weight: 800;
      background: #d97706; color: #fff;
      vertical-align: middle; margin-left: 0.3em; line-height: 1;
    }
    /* 顶部待确认提示条 */
    .pending-banner {
      background: var(--warn-bg); border: 1px solid #fcd34d; border-radius: var(--radius);
      padding: 0.6rem 1rem; margin-bottom: 1.1rem;
      font-size: 0.88rem; font-weight: 600; color: #92400e;
      align-items: center; gap: 0.6rem;
    }
    .pending-banner a { color: #92400e; border-bottom: 1px solid #fcd34d; font-weight: 700; }
    .pending-banner a:hover { color: #78350f; border-bottom-color: #92400e; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 1.5rem 1.35rem;
      margin-bottom: 1.25rem;
    }
    h1 { font-size: 1.4rem; margin: 0 0 0.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 0.94rem; margin-bottom: 1.15rem; }
    label { display: block; font-weight: 600; font-size: 0.86rem; margin: 0.85rem 0 0.35rem; color: var(--text); }
    /* 含未写 type 的 input（HTML5 默认为 text，但 [type="text"] 选不中），避免与 tel/number 边框不一致 */
    input:not([type="hidden"]):not([type="file"]):not([type="checkbox"]):not([type="radio"]):not([type="submit"]):not([type="button"]):not([type="reset"]):not([type="image"]),
    textarea, select {
      width: 100%; padding: 0.65rem 0.75rem; border: 1px solid var(--input-border); border-radius: var(--radius);
      font: inherit; background: var(--card); color: var(--text);
      box-sizing: border-box;
    }
    input[type="file"] {
      width: 100%; padding: 0.55rem 0.65rem; border: 1px solid var(--input-border); border-radius: var(--radius);
      font: inherit; background: var(--card); color: var(--text);
      box-sizing: border-box;
    }
    input:not([type="hidden"]):not([type="file"]):not([type="checkbox"]):not([type="radio"]):not([type="submit"]):not([type="button"]):not([type="reset"]):not([type="image"]):focus,
    textarea:focus, select:focus, input[type="file"]:focus {
      outline: none; border-color: var(--text); box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.06);
    }
    textarea { min-height: 88px; resize: vertical; }
    /* 隐藏 number input 的上下小箭头（直接输入即可） */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="checkbox"], input[type="radio"] {
      accent-color: var(--accent);
      width: 1.05em; height: 1.05em;
      flex-shrink: 0;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .row2 > * { min-width: 0; }
    @media (max-width: 560px) { .row2 { grid-template-columns: 1fr; } }
    .admin-filter-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: center;
      margin-top: 0.35rem;
    }
    .admin-filter-check {
      margin: 0;
      font-weight: 600;
      display: flex;
      gap: 0.4rem;
      align-items: center;
      cursor: pointer;
      color: var(--text);
    }
    .admin-query-btn { min-width: 7.5rem; }
    @media (max-width: 560px) {
      .admin-filter-actions { grid-template-columns: 1fr; }
      .admin-query-btn { width: 100%; }
    }
    .checks label { font-weight: 500; display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer; color: var(--text); }
    .checks input { margin-top: 0.25rem; }
    button, .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.62rem 1.1rem; border-radius: var(--radius-md); border: 1px solid var(--accent);
      font: inherit; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fafafa;
    }
    button:hover, .btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
    button.secondary, .btn.secondary {
      background: var(--card); color: var(--text); border-color: var(--border-strong);
    }
    button.secondary:hover, .btn.secondary:hover { background: var(--bg-elevated); border-color: var(--muted); }
    button.danger, .btn.danger {
      background: var(--danger-bg); color: var(--danger-fg); border-color: #fca5a5;
    }
    button.danger:hover, .btn.danger:hover { background: #fecaca; border-color: var(--danger-fg); color: var(--danger-fg); }
    .badge {
      display: inline-block; padding: 0.2rem 0.55rem; border-radius: var(--radius-sm);
      font-size: 0.72rem; font-weight: 600; border: 1px solid var(--border);
    }
    .b-pending { background: var(--warn-bg); color: var(--warn-fg); border-color: var(--border-strong); }
    .b-ok { background: #f5f5f5; color: #262626; border-color: #d4d4d4; }
    .b-no { background: #e5e5e5; color: #171717; border-color: #a3a3a3; }
    .b-done { background: var(--card); color: var(--text); border-color: var(--text); }

    /* ── 通用工具类（pill/data-table/page-head/list-tabs）── */
    .pill {
      display: inline-block; padding: 0.1rem 0.55rem; border-radius: var(--radius-pill);
      font-size: 0.72rem; font-weight: 600; border: 1px solid; line-height: 1.5;
    }
    .pill-ok    { background: var(--ok-bg);     color: var(--ok-fg);     border-color: #6ee7b7; }
    .pill-warn  { background: var(--warn-bg);   color: var(--warn-fg);   border-color: #fcd34d; }
    .pill-no    { background: var(--danger-bg); color: var(--danger-fg); border-color: #fca5a5; }
    .pill-gray  { background: #f3f4f6; color: #6b7280; border-color: #d1d5db; }
    .pill-info  { background: var(--info-bg); color: var(--info-fg); border-color: var(--brand-light); }
    .pill-purple{ background: #f5f3ff; color: #5b21b6; border-color: #c4b5fd; }
    .pill-pink  { background: #fce7f3; color: #9d174d; border-color: #f9a8d4; }

    /* 页面头部统一样式 */
    .page-head {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1rem;
    }
    .page-head h1 {
      margin: 0; font-size: 1.25rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .page-head .ph-icon { font-size: 1.5rem; }
    .page-head .ph-sub {
      margin: 0.15rem 0 0; font-size: 0.82rem; color: var(--muted);
    }
    .page-head .ph-actions {
      display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
    }

    /* 数据表格统一样式 */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .data-table th {
      text-align: left; padding: 0.5rem 0.75rem; font-weight: 600;
      font-size: 0.74rem; color: var(--muted); background: #fafbfc;
      border-bottom: 1px solid var(--border); letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .data-table td {
      padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #fafbfc; }
    .data-table a { color: var(--brand); text-decoration: none; }
    .data-table a:hover { text-decoration: underline; }
    .data-table-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }

    /* 状态 Tab 栏 */
    .list-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 1rem; overflow-x: auto;
    }
    .list-tab {
      padding: 0.5rem 1.15rem; text-decoration: none;
      color: var(--muted); font-size: 0.88rem; font-weight: 500;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      white-space: nowrap;
    }
    .list-tab:hover { color: var(--text); }
    .list-tab.active {
      color: var(--brand); border-bottom-color: var(--brand); font-weight: 600;
    }
    .list-tab .count {
      display: inline-block; margin-left: 0.25rem;
      background: #e5e7eb; color: #6b7280; padding: 0 0.4em;
      border-radius: var(--radius-pill); font-size: 0.7rem; font-weight: 600;
    }
    .list-tab.active .count { background: var(--info-bg); color: var(--info-fg); }

    /* 筛选卡片 */
    .filter-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.65rem 0.85rem; margin-bottom: 0.85rem;
    }
    .filter-row {
      display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;
    }

    /* 统计小卡 */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 0.75rem; margin-bottom: 1rem; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.85rem 1rem; display: flex; align-items: center; gap: 0.8rem;
    }
    .stat-card .stat-num {
      font-size: 1.6rem; font-weight: 700; line-height: 1.1;
    }
    .stat-card .stat-label {
      font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem;
    }
    .stat-card.s-warn .stat-num { color: #d97706; }
    .stat-card.s-ok   .stat-num { color: #15803d; }
    .stat-card.s-info .stat-num { color: var(--brand); }

    /* 空状态 */
    .empty-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); text-align: center; padding: 3rem 1rem;
      color: var(--muted); font-size: 0.92rem;
    }
    .empty-card .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .msg { padding: 0.75rem 1rem; border-radius: var(--radius-md); margin-top: 1rem; font-size: 0.92rem; border: 1px solid var(--border); }
    .msg.ok { background: var(--ok-bg); color: var(--ok-fg); border-color: var(--border-strong); }
    .msg.err { background: var(--danger-bg); color: var(--danger-fg); border-color: #a3a3a3; }
    footer { margin-top: 2rem; font-size: 0.78rem; color: var(--muted); text-align: center; }

    /* ── 底部多标签栏 ─────────────────────────────────────── */
    .qtabs { position: fixed; left: 0; right: 0; bottom: 0;
             background: rgba(255,255,255,0.96); backdrop-filter: blur(8px);
             border-top: 1px solid #e5e7eb; z-index: 950; display: none;
             padding: 4px 8px 4px 8px;
             /* iOS 底部 home 指示器避让 — 标签栏整体上移，标签不再贴边
                导致误触 home 手势 */
             padding-bottom: calc(4px + env(safe-area-inset-bottom, 0px)); }
    .qtabs.has-tabs { display: flex; gap: 4px; overflow-x: auto;
                       -webkit-overflow-scrolling: touch; scrollbar-width: thin; }
    .qtab { display: inline-flex; align-items: center; gap: 5px;
             flex: 0 0 auto; max-width: 240px;
             padding: 5px 10px 5px 10px; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
             background: #f3f4f6; color: #4b5563; font-size: 0.82rem;
             text-decoration: none; line-height: 1.4; white-space: nowrap;
             border: 1px solid transparent; border-bottom: none;
             cursor: pointer; user-select: none;
             /* 手机点触面积加大 — 至少 32px 高，方便手指点 */
             min-height: 32px; }
    .qtab:hover { background: #e5e7eb; }
    .qtab.active { background: #fff; color: #111827; font-weight: 600;
                   border-color: #d1d5db; box-shadow: 0 -2px 4px rgba(0,0,0,.04); }
    .qtab .qtab-link {
      display: inline-flex; align-items: center; gap: 5px;
      color: inherit; text-decoration: none; min-width: 0;
      padding: 0 2px;
    }
    .qtab .qt-icon { font-size: 0.95rem; }
    .qtab .qt-label { overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .qtab .qt-close {
      color: #9ca3af; font-size: 1rem; line-height: 1; padding: 2px 6px;
      border-radius: 4px; background: none; border: none; cursor: pointer;
      margin-left: 4px; touch-action: manipulation;
    }
    .qtab .qt-close:hover, .qtab .qt-close:active {
      background: #fee2e2; color: #b91c1c;
    }
    .qtab-clear { display: inline-flex; align-items: center; padding: 0 8px;
                   font-size: 0.78rem; color: #9ca3af; cursor: pointer; }
    .qtab-clear:hover { color: #ef4444; }
    /* 给页面留底部空间，避免被 tab 栏遮住（含 safe-area） */
    body.has-qtabs { padding-bottom: calc(42px + env(safe-area-inset-bottom, 0px)); }
    @media (max-width: 640px) {
      .qtab { max-width: 140px; padding: 6px 10px; font-size: 0.78rem; min-height: 34px; }
      .qtab .qt-label { max-width: 100px; }
      /* 手机上标签栏整体高度稍微增加，让标签离 home 指示器更远 */
      .qtabs { padding-top: 6px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); }
    }

    /* ══════════════════════════════════════════════════════════════
       移动端响应式底座（≤768px）
       原则：表格 → 横滑 + 字号缩小；过窄时 .data-table.mobile-card 自动转卡片
       ══════════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      /* ── 全局容器 ── */
      .wrap { padding: 0.6rem 0.75rem 4rem; }

      /* ── 顶部品牌栏 ── */
      .ribbon-top { padding: 0.4rem 0.75rem !important; flex-wrap: wrap; gap: .3rem .6rem; }
      .ribbon-brand { font-size: .92rem !important; }
      .ribbon-brand span { font-size: .76rem !important; }
      .ribbon-brand .brand-logo { width: 24px !important; height: 24px !important; }
      .ribbon-user { font-size: .78rem !important; }

      /* ── 二级 ribbon tab 横滑 ── */
      .ribbon-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .ribbon-tabs::-webkit-scrollbar { display: none; }
      .ribbon-tab { white-space: nowrap; }
      .ribbon-icons { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* ── 页头：纵向堆叠 ── */
      .page-head { flex-direction: column; align-items: stretch; }
      .page-head h1 { font-size: 1.05rem; }
      .page-head .ph-icon { font-size: 1.25rem; }
      .page-head .ph-actions { width: 100%; justify-content: flex-start; flex-wrap: wrap; }
      .page-head .ph-actions .btn { font-size: .82rem !important; padding: .35rem .7rem !important; }

      /* ── 卡片 / 内边距收紧 ── */
      .card { padding: .85rem .8rem !important; border-radius: var(--radius-md) !important; }

      /* ── 筛选条：自动多行 + 输入框占满 ── */
      .filter-card { padding: .55rem .65rem; margin-bottom: .65rem; }
      .filter-row { gap: .4rem; }
      .filter-row input[type="text"],
      .filter-row input[type="search"],
      .filter-row input:not([type]) { flex: 1 1 100%; min-width: 0 !important; }
      .filter-row select { flex: 1 1 calc(50% - .2rem); min-width: 0 !important; }
      .filter-row .btn,
      .filter-row button { flex: 1 1 calc(50% - .2rem); min-width: 0 !important; }

      /* ── 表格通用：默认包一层横滑；字号缩小 ── */
      .data-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-md); }
      .data-table { font-size: .8rem; min-width: 100%; }
      .data-table th, .data-table td { padding: .4rem .55rem; }
      .data-table th { font-size: .68rem; }

      /* ── 表格"卡片模式"：给 <table class="data-table mobile-card"> 用 ── */
      .data-table.mobile-card,
      .data-table.mobile-card thead,
      .data-table.mobile-card tbody,
      .data-table.mobile-card tr,
      .data-table.mobile-card td { display: block; width: 100%; }
      .data-table.mobile-card thead { display: none; }
      .data-table.mobile-card tr {
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--radius-md); padding: .65rem .85rem; margin-bottom: .55rem;
      }
      .data-table.mobile-card td {
        border: none !important; padding: .18rem 0 !important;
        display: flex !important; justify-content: space-between; align-items: center;
        font-size: .85rem; gap: .6rem; min-height: 1.8rem;
      }
      /* 用 data-label 属性渲染字段名（如 <td data-label="客户">...</td>） */
      .data-table.mobile-card td[data-label]::before {
        content: attr(data-label); color: var(--muted); font-size: .74rem;
        font-weight: 500; flex: 0 0 auto; margin-right: .8rem;
      }
      /* 卡片第一行通常是主信息，加粗 */
      .data-table.mobile-card td:first-child { font-weight: 600; font-size: .95rem; padding-top: 0 !important; }
      .data-table.mobile-card td:first-child::before { display: none; }
      .data-table.mobile-card td:last-child { padding-bottom: 0 !important; }
      /* 操作按钮列：右对齐成一排 */
      .data-table.mobile-card td.actions { justify-content: flex-end; padding-top: .4rem !important; border-top: 1px dashed var(--border) !important; margin-top: .3rem; }
      /* 多行内容的单元格：取消 flex 横排，改成 label 在上、内容在下，避免文字溢出/错位 */
      .data-table.mobile-card td.multiline {
        display: block !important;
        padding: .35rem 0 !important;
      }
      .data-table.mobile-card td.multiline::before {
        display: block !important; margin: 0 0 .2rem !important;
      }
      .data-table.mobile-card td.multiline > div {
        text-align: left !important;
      }

      /* ── 表单：所有表单字段竖排，输入框满宽 ── */
      .row2 { grid-template-columns: 1fr !important; gap: .6rem !important; }
      form input[type="text"],
      form input[type="tel"],
      form input[type="number"],
      form input[type="date"],
      form input[type="email"],
      form input[type="password"],
      form input[type="search"],
      form select,
      form textarea { font-size: 16px !important; /* ≥16px 防 iOS 自动放大 */ width: 100%; box-sizing: border-box; }
      form label { font-size: .85rem; }

      /* ── 按钮触摸目标 ── */
      .btn, button, input[type="submit"] {
        min-height: 38px; touch-action: manipulation;
      }
      .btn.secondary, button.secondary { min-height: 34px; }

      /* ── 统计小卡：2 列 ── */
      .stat-grid { grid-template-columns: repeat(2, 1fr); gap: .55rem; }
      .stat-card { padding: .65rem .75rem; }
      .stat-card .stat-num { font-size: 1.25rem; }
      .stat-card .stat-label { font-size: .7rem; }

      /* ── List-tabs 横滑 ── */
      .list-tabs { gap: 0; padding: 0 .2rem; }
      .list-tab { padding: .45rem .8rem; font-size: .82rem; }

      /* ── pill 字号微调 ── */
      .pill { font-size: .68rem; padding: .08rem .45rem; }

      /* ── 让 iframe / 图片不溢出 ── */
      iframe, img, video { max-width: 100%; height: auto; }

      /* ── 防止 overflow 出现横向滚动 ── */
      html, body { overflow-x: hidden; max-width: 100vw; }
      /* nuclear：所有 input/select 强制不超容器 */
      input[type="date"], input[type="datetime-local"], input[type="time"],
      input[type="text"], input[type="tel"], input[type="number"], input[type="email"],
      input[type="password"], input[type="search"], select, textarea {
        max-width: 100% !important; min-width: 0 !important;
        box-sizing: border-box !important;
      }
      /* grid item 默认 min-width:auto 拒绝缩小，全局兜底 */
      [style*="display:grid"] > *, [style*="display: grid"] > * { min-width: 0 !important; }

      /* 全局：详情/编辑页常见的「左主+右侧栏」2 列布局，手机塌缩为单列
         匹配 1fr <数字>px 模式（侧栏宽度 200-400px 都行） */
      [style*="grid-template-columns:1fr 2"][style*="px"],
      [style*="grid-template-columns: 1fr 2"][style*="px"],
      [style*="grid-template-columns:1fr 3"][style*="px"],
      [style*="grid-template-columns: 1fr 3"][style*="px"],
      [style*="grid-template-columns:1fr 4"][style*="px"],
      [style*="grid-template-columns: 1fr 4"][style*="px"] {
        grid-template-columns: 1fr !important;
      }

      /* 「录入型」表格（处方 drug-table / 检查单 item-table）：保留表格语义，
         父级允许横向滚动。给 table 设最小宽度防止被压扁。 */
      .drug-table, .item-table { min-width: 680px; }
      /* 在父容器（.card 或 .form-scroll-wrap）放横向滚动 */
      .form-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* 模态弹层：手机上全屏化，像原生 App 的页面而非弹窗 */
      .cust-modal-overlay {
        align-items: stretch !important; justify-content: stretch !important;
        padding: 0 !important;
      }
      .cust-modal-overlay > div,
      .cust-modal,
      [class*="modal"][style*="position:fixed"] > div {
        width: 100vw !important; max-width: 100vw !important;
        height: 100vh !important; max-height: 100vh !important;
        border-radius: 0 !important;
        margin: 0 !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
        box-shadow: none !important;
        padding: 1rem 1rem 4rem !important;
        box-sizing: border-box !important;
      }
      /* 模态标题 h3：变成 sticky 顶栏 */
      .cust-modal-overlay > div > h3:first-child,
      .cust-modal > h3:first-child {
        position: sticky !important; top: -1rem !important;
        background: var(--card); margin: -1rem -1rem .75rem !important;
        padding: .85rem 1rem !important;
        border-bottom: 1px solid var(--border);
        font-size: 1.05rem !important; z-index: 5;
      }
      /* 模态里所有输入框统一 — 防止 iOS date 撑爆 */
      .cust-modal-overlay input,
      .cust-modal-overlay select,
      .cust-modal-overlay textarea {
        width: 100% !important; box-sizing: border-box !important;
        -webkit-appearance: none !important; appearance: none !important;
        max-width: 100% !important; min-width: 0 !important;
      }
      /* 模态底部 form 按钮 sticky 在底部 */
      .cust-modal-overlay form > div[style*="display:flex"]:last-child {
        position: sticky; bottom: 0; background: var(--card);
        margin: 1rem -1rem -1rem !important; padding: .75rem 1rem !important;
        border-top: 1px solid var(--border); z-index: 5;
      }
    }

    /* 极窄屏（≤480px）二次收紧 */
    @media (max-width: 480px) {
      .wrap { padding: 0.4rem 0.55rem 4rem; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .data-table { font-size: .76rem; }
      .data-table.mobile-card tr { padding: .55rem .7rem; }
      .filter-row select { flex: 1 1 100%; }
    }

    /* ── 全局图片 Lightbox（PWA standalone 模式下 _blank 没用，必须用弹层） ── */
    #lb-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.92);
      z-index: 99999; display: none; align-items: center; justify-content: center;
      touch-action: none;
    }
    #lb-overlay.open { display: flex; }
    #lb-overlay img, #lb-overlay video {
      max-width: 96vw; max-height: 92vh; object-fit: contain;
      box-shadow: 0 12px 60px rgba(0,0,0,.5);
    }
    #lb-close {
      position: fixed; top: env(safe-area-inset-top, 12px); right: 16px;
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: rgba(255,255,255,.95); color: #111; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 100000; box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    #lb-hint {
      position: fixed; bottom: env(safe-area-inset-bottom, 16px); left: 0; right: 0;
      text-align: center; color: rgba(255,255,255,.6); font-size: .8rem;
      pointer-events: none; z-index: 100000;
    }
  </style>

  <script>

      // 医疗

      '/admin/vaccinations': { label: '疫苗管理',   kind: 'page', icon: 'syringe' },
      '/admin/rabies':       { label: '狂犬疫苗',   kind: 'page', icon: 'dog' },

      '/admin/inpatient':    { label: '住院管理',   kind: 'page', icon: 'bed-double' },
      '/admin/cages':        { label: '笼位管理',   kind: 'page', icon: 'layout-grid' },
      '/admin/follow-ups':   { label: '回访管理',   kind: 'page', icon: 'phone' },
      '/admin/consent-templates': { label: '协议模板', kind: 'page', icon: 'pen-tool' },
      // 经营
      '/admin/invoices':     { label: '收银台',     kind: 'page', icon: 'receipt' },
      '/admin/inventory':    { label: '库存管理',   kind: 'page', icon: 'package' },
      '/admin/stocktake':    { label: '循环盘点',   kind: 'page', icon: 'bar-chart-3' },
      '/admin/sales':        { label: '销售单',     kind: 'page', icon: 'shopping-cart' },
      '/admin/packages':     { label: '套餐目录',   kind: 'page', icon: 'ticket' },
      '/admin/coupons':      { label: '优惠券',     kind: 'page', icon: 'ticket' },
      '/admin/reports/revenue': { label: '收款统计', kind: 'page', icon: 'bar-chart-3' },
      '/admin/feedback':     { label: '客户反馈',   kind: 'page', icon: 'message-circle' },
      // 系统
      '/admin/hr':           { label: '人事管理',   kind: 'page', icon: 'briefcase' },
      '/admin/adoption':     { label: '领养',       kind: 'page', icon: 'paw-print' },
      '/admin/changelog':    { label: '开发日志',   kind: 'page', icon: 'pencil-line' },
      '/admin/audit-logs':   { label: '审计日志',   kind: 'page', icon: 'shield-check' },
    };
    // 判断 icon 是否是 Lucide 名（纯 ASCII 字母+连字符）。兼容 localStorage 里旧的 emoji。
    function isLucideIcon(s) {
      return typeof s === 'string' && /^[a-z][a-z0-9-]*$/.test(s);
    }
    function renderIcon(icon) {
      if (isLucideIcon(icon)) return '<i data-lucide="' + icon + '"></i>';
      return icon || '';
    }

    function lookupPath(p) {
      return PATH_LABELS[p] || null;
    }

    function readTabs() {
      try {
        var raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        // 兼容旧数据：按 key 去重；同名 page 类 tab 也去重（修复历史 bug）
        var seenKeys = {}, seenPageLabels = {}, clean = [];
        for (var i = 0; i < raw.length; i++) {
          var t = raw[i];
          if (!t || !t.key) continue;
          if (seenKeys[t.key]) continue;
          if (t.kind === 'page' && seenPageLabels[t.label]) continue;
          // 旧数据自动升级：icon 还是 emoji 时，按 key 反查 PATH_LABELS 替换成 lucide 名
          if (!isLucideIcon(t.icon)) {
            var hit = PATH_LABELS[t.key];
            t.icon = hit ? hit.icon : 'file-text';
          }
          seenKeys[t.key] = true;
          if (t.kind === 'page') seenPageLabels[t.label] = true;
          clean.push(t);
        }
        return clean;
      } catch (e) { return []; }
    }
    function writeTabs(arr) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr.slice(0, MAX_TABS))); }
      catch (e) {}
    }
    function pageMeta(name) {
      var m = document.querySelector('meta[name="' + name + '"]');
      return m ? (m.getAttribute('content') || '') : '';
    }
    function currentTab() {
      var path = location.pathname.replace(/\/$/, '');
      var label = pageMeta('tab-label');
      var kind, icon;
      if (label) {
        // 详情页：用 meta 标签覆盖
        kind = pageMeta('tab-kind') || 'detail';
        icon = pageMeta('tab-icon') ||
               ({customer:'user', visit:'clipboard-list', prescription:'pill', exam:'flask-conical', invoice:'receipt'}[kind] || 'file-text');
      } else {
        // 列表/功能页：按 PATH_LABELS 推断
        var hit = lookupPath(path);
        if (!hit) return null;
        label = hit.label; kind = hit.kind; icon = hit.icon;
      }
      // url = pathname + search，去掉 hash / msg= / err= / page= 等临时参数
      var url = location.pathname + location.search;
      url = url.replace(/[?&]msg=[^&]*/g, '')
               .replace(/[?&]err=[^&]*/g, '')
               .replace(/[?&]page=\d+/g, '');
      // 收尾清理
      url = url.replace(/\?&/, '?').replace(/\?$/, '');
      return { key: path, url: url, label: label, kind: kind, icon: icon, ts: Date.now() };
    }
    function upsert(tabs, tab) {
      var idx = -1;
      for (var i = 0; i < tabs.length; i++) {
        if (tabs[i].key === tab.key) { idx = i; break; }
      }
      if (idx >= 0) {
        // 更新已有 tab 的 label/url，但保持位置
        tabs[idx].label = tab.label;
        tabs[idx].url   = tab.url;
        tabs[idx].icon  = tab.icon;
        tabs[idx].kind  = tab.kind;
        tabs[idx].ts    = tab.ts;
      } else {
        tabs.unshift(tab);
        // 超出上限：先淘汰最早的功能页（kind=page），保护客户/处方/就诊/检查
        while (tabs.length > MAX_TABS) {
          var evictIdx = -1;
          for (var k = tabs.length - 1; k > 0; k--) {
            if (tabs[k].kind === 'page') { evictIdx = k; break; }
          }
          if (evictIdx < 0) evictIdx = tabs.length - 1;  // 全是详情页，淘汰最旧的
          tabs.splice(evictIdx, 1);
        }
      }
      return tabs;
    }
    function render() {
      var bar = document.getElementById('qtabs');
      if (!bar) return;
      var tabs = readTabs();
      bar.innerHTML = '';
      if (!tabs.length) {
        bar.classList.remove('has-tabs');
        document.body.classList.remove('has-qtabs');
        return;
      }
      bar.classList.add('has-tabs');
      document.body.classList.add('has-qtabs');
      var here = location.pathname.replace(/\/$/, '');
      tabs.forEach(function(t) {
        // 用容器 + 内部链接 + 单独的关闭按钮（不再让 × 套在 <a> 里）
        // —— 避免 iOS Safari 上点 × 时父 <a> 的导航行为吞掉 preventDefault 导致页面卡顿
        var wrap = document.createElement('span');
        wrap.className = 'qtab' + (t.key === here ? ' active' : '');
        wrap.title = t.label;

        var a = document.createElement('a');
        a.className = 'qtab-link';
        a.href = t.url;
        a.innerHTML =
          '<span class="qt-icon">' + renderIcon(t.icon || 'file-text') + '</span>' +
          '<span class="qt-label"></span>';
        a.querySelector('.qt-label').textContent = t.label;
        wrap.appendChild(a);

        var closeBtn = document.createElement('button');
        closeBtn.type = 'button';
        closeBtn.className = 'qt-close';
        closeBtn.setAttribute('aria-label', '关闭');
        closeBtn.textContent = '×';
        // 轻量"原地移除"：只动这个 qtab + localStorage，不触发整个 render()
        // —— 避免 lucide.createIcons + MutationObserver 在 iOS 上递归卡死
        var doClose = function(ev) {
          if (ev) { ev.preventDefault(); ev.stopPropagation(); }
          // 1) 先把当前这个 qtab DOM 节点拿掉，UI 立即响应
          if (wrap && wrap.parentNode) wrap.parentNode.removeChild(wrap);
          // 2) 异步写 localStorage，不阻塞主线程
          setTimeout(function() {
            try {
              var raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
              var rest = raw.filter(function(x) { return x && x.key !== t.key; });
              localStorage.setItem(STORAGE_KEY, JSON.stringify(rest));
              // 全删了 → 隐藏 bar
              if (!bar.children.length) {
                bar.classList.remove('has-tabs');
                document.body.classList.remove('has-qtabs');
              }
            } catch (e) {}
          }, 0);
          return false;
        };
        closeBtn.addEventListener('click', doClose);
        closeBtn.addEventListener('touchend', doClose, {passive: false});
        // 阻断冒泡，避免触发 qtab 容器或外层链接的副作用
        ['mousedown', 'touchstart', 'pointerdown'].forEach(function(et) {
          closeBtn.addEventListener(et, function(ev) { ev.stopPropagation(); }, {passive: true});
        });
        wrap.appendChild(closeBtn);

        bar.appendChild(wrap);
      });
      if (tabs.length >= 2) {
        var clr = document.createElement('span');
        clr.className = 'qtab-clear';
        clr.title = '关闭所有标签';
        clr.textContent = '清空';
        clr.addEventListener('click', function() {
          if (confirm('清空所有标签？')) { writeTabs([]); render(); }
        });
        bar.appendChild(clr);
      }
      // 渲染完触发 Lucide，把 <i data-lucide=".."> 转成 SVG
      if (window.lucide) { try { lucide.createIcons({ attrs: { class: 'ico' } }); } catch(e){} }
    }

    // 进入当前页时，若是可标签化页面 → upsert
    var ct = currentTab();
    if (ct) {
      var tabs = upsert(readTabs(), ct);
      writeTabs(tabs);
    }
    render();

    // 跨标签同步（一个页面关掉 tab，另一个页面同步）
    window.addEventListener('storage', function(e) {
      if (e.key === STORAGE_KEY) render();
    });
  })();
  </script>

  {# ── 全局图片 Lightbox：拦截所有 <a href="/file/..."> 点击，弹层显示 ── #}
  <div id="lb-overlay" role="dialog" aria-hidden="true">
    <button id="lb-close" aria-label="关闭"><i data-lucide="x"></i></button>
    <div id="lb-content"></div>
    <div id="lb-hint">轻触画面外或按 <i data-lucide="x"></i> 关闭</div>
  </div>
  <script>
  (function () {
    var overlay = document.getElementById('lb-overlay');
    var content = document.getElementById('lb-content');
    var closeBtn = document.getElementById('lb-close');
    if (!overlay || !content || !closeBtn) return;

    var IMG_EXT = /\.(jpe?g|png|webp|gif|bmp|svg|heic|heif)(\?.*)?$/i;
    var VID_EXT = /\.(mp4|mov|avi|mkv|webm|m4v)(\?.*)?$/i;

    function isFileHref(href) {
      if (!href) return false;
      // 同源 /file/123 或 /uploads/xxx.jpg
      if (href.indexOf('/file/') === 0) return true;
      if (href.indexOf('/uploads/') === 0) return true;
      return false;
    }
    function isMediaTarget(a) {
      // 优先：图片/视频文件名后缀
      var href = a.getAttribute('href') || '';
      if (IMG_EXT.test(href) || VID_EXT.test(href)) return true;
      // /file/{id} 没有扩展名，但 <a> 里包了 <img> 或 <video> 就当媒体处理
      if (a.querySelector('img, video')) return true;
      return false;
    }

    function openLightbox(src, kind) {
      content.innerHTML = '';
      var el;
      if (kind === 'video') {
        el = document.createElement('video');
        el.src = src; el.controls = true; el.autoplay = true; el.playsInline = true;
      } else {
        el = document.createElement('img');
        el.src = src; el.alt = '查看';
      }
      content.appendChild(el);
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      // 进入历史栈，让系统返回手势/按钮也能关闭
      try { history.pushState({ lb: 1 }, ''); } catch (e) {}
    }
    function closeLightbox() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      content.innerHTML = '';
      document.body.style.overflow = '';
    }

    // 全局拦截：任何指向 /file/ 或 /uploads/ 的 <a> 点击
    document.addEventListener('click', function (e) {
      var a = e.target.closest && e.target.closest('a');
      if (!a) return;
      var href = a.getAttribute('href') || '';
      if (!isFileHref(href)) return;
      if (!isMediaTarget(a)) return;
      // 修饰键不拦截（用户主动想在新标签打开）
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      e.preventDefault();
      // 推断类型
      var kind = VID_EXT.test(href) || a.querySelector('video') ? 'video' : 'image';
      openLightbox(href, kind);
    }, true);

    closeBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      closeLightbox();
      try { if (history.state && history.state.lb) history.back(); } catch (_) {}
    });
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay || e.target === content) {
        closeLightbox();
        try { if (history.state && history.state.lb) history.back(); } catch (_) {}
      }
    });
    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && overlay.classList.contains('open')) {
        closeLightbox();
        try { if (history.state && history.state.lb) history.back(); } catch (_) {}
      }
    });
    // 系统返回手势/按钮：popstate 时关掉弹层
    window.addEventListener('popstate', function () {
      if (overlay.classList.contains('open')) closeLightbox();
    });
  })();
  </script>

  {# Lucide 图标渲染：扫描所有 data-lucide 属性并替换为 SVG
     2026-06-02 修：MutationObserver 全树扫描 + 多 tab storage event 叠加导致
     主线程卡死。改为：仅监听确实新增 data-lucide 的节点，节流到 250ms 调一次
     createIcons，且观察期间临时 disconnect，防自身 mutation 触发回调。 #}
  <script>
    if (window.lucide) {
      lucide.createIcons({ attrs: { class: 'ico' } });
      var _icoPending = false;
      var _icoObserver = new MutationObserver(function (muts) {
        if (_icoPending) return;          // 已经排队，跳过
        // 快速过滤：只看节点级别属性 + 顶层 querySelector，缩短遍历
        var found = false;
        for (var i = 0; i < muts.length && !found; i++) {
          var nodes = muts[i].addedNodes;
          if (!nodes) continue;
          for (var j = 0; j < nodes.length && !found; j++) {
            var n = nodes[j];
            if (n.nodeType !== 1) continue;
            if (n.hasAttribute && n.hasAttribute('data-lucide')) { found = true; break; }
            // 子树搜索仅在浅层做一次，避免 1000+ 行 table 全树扫描
            if (n.querySelector && n.querySelector('[data-lucide]')) { found = true; break; }
          }
        }
        if (!found) return;
        _icoPending = true;
        // 节流：250ms 后再调一次 createIcons，期间停掉 observer
        setTimeout(function () {
          _icoObserver.disconnect();
          try { lucide.createIcons({ attrs: { class: 'ico' } }); } catch (e) {}
          _icoPending = false;
          _icoObserver.observe(document.body, { childList: true, subtree: true });
        }, 250);
      });
      _icoObserver.observe(document.body, { childList: true, subtree: true });
    }
  </script>

  {# ── 全局：防止表单重复提交（用户连点 N 次造成重复创建） ── #}
  <script>
    document.addEventListener('submit', function (e) {
      var form = e.target;
      if (!form || form.tagName !== 'FORM') return;
      // 已经标记过的不重复处理
      if (form.dataset.submitting === '1') {
        e.preventDefault();
        return false;
      }
      form.dataset.submitting = '1';
      var btns = form.querySelectorAll('button[type="submit"], input[type="submit"]');
      btns.forEach(function (btn) {
        btn.disabled = true;
        btn.style.opacity = '0.6';
        btn.style.cursor = 'wait';
        if (!btn.dataset.origText && btn.tagName === 'BUTTON') {
          btn.dataset.origText = btn.innerHTML;
          btn.innerHTML = '提交中…';
        }
      });
      // 网络很慢的兜底：10 秒后恢复，允许重试
      setTimeout(function () {
        form.dataset.submitting = '';
        btns.forEach(function (btn) {
          btn.disabled = false;
          btn.style.opacity = '';
          btn.style.cursor = '';
          if (btn.dataset.origText) {
            btn.innerHTML = btn.dataset.origText;
            btn.dataset.origText = '';
          }
        });
      }, 10000);
    }, true);
  </script>
