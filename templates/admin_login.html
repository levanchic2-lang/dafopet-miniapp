{% extends "base.html" %}
{% block body %}
<div class="card" style="max-width:420px;margin:2rem auto;">
  <h1>医院后台登录</h1>
  {% if error %}<div class="msg err">{{ error }}</div>{% endif %}
  <form method="post" action="/admin/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <label for="username">用户名</label>
    <input type="text" id="username" name="username" required autocomplete="username" autofocus />
    <label for="password">密码</label>
    <input type="password" id="password" name="password" required autocomplete="current-password" />
    <button type="submit" style="margin-top:1rem;width:100%;">登录</button>
  </form>

  <div style="margin-top:1.2rem;text-align:center;color:var(--muted);font-size:.82rem;">
    <span style="display:inline-block;border-top:1px solid var(--border);width:30%;vertical-align:middle;"></span>
    <span style="margin:0 .6rem;">或</span>
    <span style="display:inline-block;border-top:1px solid var(--border);width:30%;vertical-align:middle;"></span>
  </div>
  <a href="/admin/wecom-login" class="btn secondary" style="margin-top:.8rem;width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;text-decoration:none;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#2ecc71" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 4C4.36 4 1 6.91 1 10.5c0 2.07 1.13 3.91 2.89 5.12-.07.27-.42 1.5-.49 1.75 0 0-.01.07.04.1.05.03.1.01.1.01.34-.05 1.96-1.14 2.24-1.31.81.24 1.68.37 2.59.37l.39-.01a4.6 4.6 0 0 1-.22-1.4c0-3.07 2.97-5.58 6.62-5.58.24 0 .48.01.71.04C15.45 6.27 12.27 4 8.5 4Zm-2.7 5.18c-.55 0-1-.45-1-1s.45-1 1-1c.55 0 1 .45 1 1s-.45 1-1 1Zm5.4 0c-.55 0-1-.45-1-1s.45-1 1-1c.55 0 1 .45 1 1s-.45 1-1 1ZM23 15.05c0-2.98-2.98-5.4-6.65-5.4-3.67 0-6.65 2.42-6.65 5.4 0 2.98 2.98 5.4 6.65 5.4.75 0 1.48-.1 2.16-.29.23.14 1.59 1.04 1.87 1.08 0 0 .04.01.08-.01.04-.02.04-.08.04-.08-.06-.21-.35-1.21-.41-1.43A4.9 4.9 0 0 0 23 15.05Zm-8.99-.75c-.46 0-.83-.37-.83-.83 0-.46.37-.83.83-.83.46 0 .83.37.83.83 0 .46-.37.83-.83.83Zm4.67 0c-.46 0-.83-.37-.83-.83 0-.46.37-.83.83-.83.46 0 .83.37.83.83 0 .46-.37.83-.83.83Z"/></svg>
    用企业微信登录
  </a>
  <p style="margin:.6rem 0 0;text-align:center;font-size:.74rem;color:var(--muted);">
    请在企业微信内打开本网址使用免密登录
  </p>
</div>
{% endblock %}
