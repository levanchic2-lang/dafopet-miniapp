<div style="background:#f5f5f5;border:1px solid #e5e5e5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:0.85rem;">
 <span style="display:inline-flex;align-items:center;"><i data-lucide="smartphone" style="width:1.5rem;height:1.5rem;"></i></span>
 <div>
 <div style="font-weight:700;font-size:0.95rem;margin-bottom:0.25rem;">推荐使用微信小程序申请</div>
 <div style="font-size:0.88rem;color:#555;line-height:1.6;">小程序可实时查看申请进度、接收审核通知、预约手术时间，体验更完整。<br>微信搜索小程序 <strong>「dafopet」</strong> 即可使用。</div>
 <div style="margin-top:0.5rem;font-size:0.82rem;color:#888;">网页端为备用入口，适合无法使用微信小程序的情况。</div>
 </div>
</div>
<div class="card">
 <h1>流浪猫绝育（TNR）申请</h1>
 <p class="sub">请如实填写信息并上传能反映猫咪<strong>室外/流浪场景</strong>的清晰照片；可同时上传短视频辅助说明。通过预审后，医院将与您联系预约到院时间。</p>
 <form id="f">
 <label for="applicant_name">申请人姓名</label>
 <input class="input-lg" id="applicant_name" name="applicant_name" required/>

 <label for="id_number">身份证号</label>
 <input class="input-lg" id="id_number" name="id_number" required maxlength="18" inputmode="numeric" autocomplete="off"/>
 <label class="checks" style="margin-top:0.5rem;"><input type="checkbox" id="id_consent" name="id_consent" value="true" required/> 我已知悉身份证号仅用于签署同意书与必要核验，后台脱敏展示；留存期限与用途以医院告知为准。</label>

 <label for="phone">手机号</label>
 <input class="input-lg" id="phone" name="phone" type="tel" required pattern="1[0-9]{10}" maxlength="11" inputmode="numeric" title="11 位中国大陆手机号"/>

 <label>居住地址 / 发现地点</label>
 <p class="addr-scope">广东省 · 深圳市<span style="font-weight:500;color:var(--muted);">（当前服务范围）</span></p>
 <p class="addr-hint">请选择区、街道，并在下方填写道路、门牌、小区等详细信息（必填）。</p>
 <div class="addr-grid">
 <div>
 <label for="addr_district" style="margin-top:0;">区 / 县</label>
 <select class="input-lg" id="addr_district" name="addr_district" aria-label="区或县" required></select>
 </div>
 <div>
 <label for="addr_street" style="margin-top:0;">街道 / 乡镇</label>
 <select class="input-lg" id="addr_street" name="addr_street" aria-label="街道或乡镇" required></select>
 </div>
 </div>
 <label for="address_detail">详细地址</label>
 <textarea class="input-lg" id="address_detail" rows="2" maxlength="240" autocomplete="street-address" required></textarea>
 <input type="hidden" name="address" id="address" value=""/>

 <div class="row2">
 <div>
 <label for="clinic_store">预约门店</label>
 <select class="input-lg" id="clinic_store" name="clinic_store" required>
 <option value="大风动物医院（东环店）">大风动物医院（东环店）</option>
 <option value="大风动物医院（横岗店）">大风动物医院（横岗店）</option>
 </select>
 </div>
 <!-- 期望手术日期已移至审核通过后预约流程 -->
 </div>

 <label for="post_surgery_plan">术后打算</label>
 <select class="input-lg" id="post_surgery_plan" name="post_surgery_plan" required>
 <option value="原地放归">原地放归</option>
 <option value="短期术后寄养 / 笼养观察后放归">短期术后寄养 / 笼养观察后放归</option>
 <option value="在固定喂养点长期管理">在固定喂养点长期管理</option>
 <option value="社会化后尝试送养/找领养">社会化后尝试送养/找领养</option>
 <option value="留作长期安置 / 中途 / 收编">留作长期安置 / 中途 / 收编</option>
 <option value="转移到更安全区域放归安置">转移到更安全区域放归安置</option>
 </select>

 <input type="hidden" id="location_lat" name="location_lat"/>
 <input type="hidden" id="location_lng" name="location_lng"/>
 <div style="margin-top:0.5rem;">
 <button type="button" class="secondary" id="btnLoc">自动获取定位</button>
 <div class="sub" id="locText" style="margin:0.35rem 0 0;">定位：未获取（可选）</div>
 </div>

 <div class="row2">
 <div>
 <label for="cat_nickname">流浪猫名字</label>
 <input class="input-lg" id="cat_nickname" name="cat_nickname" required maxlength="120"/>
 </div>
 <div>
 <label for="cat_gender">性别</label>
 <select class="input-lg" id="cat_gender" name="cat_gender" required>
 <option value="male">公猫</option>
 <option value="female">母猫</option>
 <option value="unknown">未知</option>
 </select>
 </div>
 </div>
 <div>
 <label for="age_estimate">出生年月（估算）</label>
 <input class="input-lg" type="month" id="age_estimate" name="age_estimate" required style="max-width:200px;"/>
 </div>
 <label for="health_note">流浪状况说明</label>
 <textarea class="input-lg" id="health_note" name="health_note" required maxlength="8000"></textarea>

 <label>申请阶段照片（至少 1 张，必填）</label>
 <input type="file" name="images" accept="image/jpeg,image/png,image/webp" multiple required/>

 <label>申请阶段视频（可选）</label>
 <p class="addr-hint">提示：更多客观流浪的证据可以增加审核通过率。</p>
 <input type="file" name="videos" accept="video/*" multiple/>

 <div class="checks" style="margin-top:1rem;">
 <label><input type="checkbox" name="agree_ear_tip" value="true" required/> 本人知悉并同意术后按规范进行<strong>剪耳标记</strong>，作为已绝育流浪猫标识。</label>
 <label><input type="checkbox" name="agree_no_pet_fraud" value="true" required/> 本人承诺所申请猫只为<strong>流浪/无主</strong>场景，非家养猫冒充申请。</label>
 </div>

 <button type="submit" style="margin-top:1.25rem;">提交申请</button>
 </form>
 <div id="out"></div>
</div>
