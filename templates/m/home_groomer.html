{% extends "m/_base.html" %}
{% block title %}今日 · 美容师{% endblock %}
{% block topbar_title %}✂ 美容工作台{% endblock %}

{% block content %}

<div class="m-card">
  <div class="m-card-title">今日待办</div>
  <a class="m-todo-row" href="/m/soon?title=今日美容预约">
    <span class="m-todo-icon" style="background:#fce7f3;">📅</span>
    <div class="m-todo-body">
      <div class="m-todo-title">今日美容预约</div>
      <div class="m-todo-sub">按时间排序</div>
    </div>
    <span class="m-todo-badge">M2.5</span>
  </a>
  <a class="m-todo-row" href="/m/soon?title=未拍照单">
    <span class="m-todo-icon" style="background:#fef3c7;">📷</span>
    <div class="m-todo-body">
      <div class="m-todo-title">前/后照片未传</div>
      <div class="m-todo-sub">完成单中提醒</div>
    </div>
    <span class="m-todo-badge">M2.5</span>
  </a>
</div>

<div class="m-section-label">快捷操作</div>
<div class="m-quick-grid">
  <a class="m-quick-tile" href="/m/soon?title=新建美容单">
    <span class="emoji">➕</span><span class="label">新建美容单</span>
  </a>
  <a class="m-quick-tile" href="/m/soon?title=搜客户">
    <span class="emoji">🔍</span><span class="label">搜客户</span>
  </a>
</div>

<div class="m-divider"></div>

<div class="m-card" style="background:#fffbeb;border:1px solid #fde68a;">
  <div style="font-size:13px;color:#92400e;line-height:1.55;">
    🚧 美容师手机端建设中。<b>M2.5</b> 即将上线：
    开美容单 + 现场拍美容前后照片直传。
  </div>
</div>

{% endblock %}
