{# 底部 tab bar · 按 mobile_role 渲染不同 tab 集 #}
{% set _t = active_tab or '' %}
<nav class="m-tabbar" role="navigation">

{% if mobile_role == 'doctor' %}
  <a class="m-tab {% if _t=='today' %}active{% endif %}"   href="/m/doctor"><span class="icon">📅</span>今日</a>
  <a class="m-tab {% if _t=='visits' %}active{% endif %}"  href="/m/soon?title=病历"><span class="icon">📝</span>病历</a>
  <a class="m-tab {% if _t=='inpatient' %}active{% endif %}" href="/m/soon?title=住院"><span class="icon">🛏</span>住院</a>
  <a class="m-tab {% if _t=='customers' %}active{% endif %}" href="/m/soon?title=客户"><span class="icon">👤</span>客户</a>
  <a class="m-tab {% if _t=='me' %}active{% endif %}"      href="/m/me"><span class="icon">⚙</span>我</a>

{% elif mobile_role == 'nurse' %}
  <a class="m-tab {% if _t=='today' %}active{% endif %}"     href="/m/nurse"><span class="icon">📅</span>今日</a>
  <a class="m-tab {% if _t=='inpatient' %}active{% endif %}" href="/m/soon?title=住院"><span class="icon">🛏</span>住院</a>
  <a class="m-tab {% if _t=='customers' %}active{% endif %}" href="/m/soon?title=客户"><span class="icon">👤</span>客户</a>
  <a class="m-tab {% if _t=='scan' %}active{% endif %}"      href="/m/soon?title=扫码"><span class="icon">📷</span>扫码</a>
  <a class="m-tab {% if _t=='me' %}active{% endif %}"        href="/m/me"><span class="icon">⚙</span>我</a>

{% elif mobile_role == 'groomer' %}
  <a class="m-tab {% if _t=='today' %}active{% endif %}"     href="/m/groomer"><span class="icon">📅</span>今日</a>
  <a class="m-tab {% if _t=='grooming' %}active{% endif %}"  href="/m/soon?title=美容单"><span class="icon">✂</span>美容单</a>
  <a class="m-tab {% if _t=='customers' %}active{% endif %}" href="/m/soon?title=客户"><span class="icon">👤</span>客户</a>
  <a class="m-tab {% if _t=='me' %}active{% endif %}"        href="/m/me"><span class="icon">⚙</span>我</a>

{% else %}
  <a class="m-tab {% if _t=='today' %}active{% endif %}" href="/m"><span class="icon">📅</span>今日</a>
  <a class="m-tab {% if _t=='me' %}active{% endif %}"    href="/m/me"><span class="icon">⚙</span>我</a>
{% endif %}

</nav>
